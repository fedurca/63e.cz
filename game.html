<!DOCTYPE html>
<html lang="cs">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="screen-orientation" content="landscape">
    <title>Stickman Skákačka</title>
    <style>
        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            background-color: #222;
            touch-action: none;
        }
        canvas {
            display: block;
        }
    </style>
</head>
<body>
    <script type="module">
        import kaboom from "https://unpkg.com/kaboom@3000.1.17/dist/kaboom.mjs";

        kaboom({
            background: [135, 206, 235],
            width: 800,
            height: 400,
            letterbox: true,
            crisp: true
        });

        const svgStickman = `data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" width="32" height="48" viewBox="0 0 32 48"><circle cx="16" cy="10" r="7" fill="black"/><line x1="16" y1="17" x2="16" y2="32" stroke="black" stroke-width="4" stroke-linecap="round"/><line x1="16" y1="22" x2="6" y2="30" stroke="black" stroke-width="4" stroke-linecap="round"/><line x1="16" y1="22" x2="26" y2="30" stroke="black" stroke-width="4" stroke-linecap="round"/><line x1="16" y1="32" x2="8" y2="46" stroke="black" stroke-width="4" stroke-linecap="round"/><line x1="16" y1="32" x2="24" y2="46" stroke="black" stroke-width="4" stroke-linecap="round"/></svg>`;
        const svgBlock = `data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" width="40" height="40"><rect width="40" height="40" fill="%238b4513"/><rect width="40" height="10" fill="%2332cd32"/></svg>`;
        const svgCoin = `data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" width="24" height="24"><circle cx="12" cy="12" r="10" fill="%23ffd700" stroke="%23daa520" stroke-width="2"/><text x="12" y="16" font-family="Arial" font-size="12" font-weight="bold" fill="%23daa520" text-anchor="middle">$</text></svg>`;
        const svgSpike = `data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" width="40" height="40"><polygon points="20,10 40,40 0,40" fill="%23696969"/></svg>`;
        const svgFlag = `data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" width="40" height="80"><rect x="18" y="10" width="4" height="70" fill="%23fff"/><polygon points="22,10 40,20 22,30" fill="%23ff0000"/></svg>`;

        loadSprite("player", svgStickman);
        loadSprite("block", svgBlock);
        loadSprite("coin", svgCoin);
        loadSprite("spike", svgSpike);
        loadSprite("flag", svgFlag);

        scene("game", () => {
            setGravity(1800);

            // Odstraněn symbol hráče (@) z mapy, vytvoříme ho samostatně
            const mapLayout = [
                "                                                  ",
                "                                                  ",
                "                                                  ",
                "                                                  ",
                "           $$                         $           ",
                "       ====           $$          =====           ",
                "                  ======                          ",
                "                                                  ",
                "             ^^              ^                  F ",
                "==================  =============================="
            ];

            const levelConf = {
                tileWidth: 40,
                tileHeight: 40,
                tiles: {
                    "=": () => [sprite("block"), area(), body({ isStatic: true }), anchor("center")],
                    "$": () => [sprite("coin"), area(), anchor("center"), "coin"],
                    "^": () => [sprite("spike"), area({ shape: new Polygon([vec2(0, 15), vec2(20, -15), vec2(-20, -15)]) }), body({ isStatic: true }), anchor("center"), "danger"],
                    "F": () => [sprite("flag"), area(), anchor("center"), "finish"]
                }
            };

            addLevel(mapLayout, levelConf);

            // Explicitní vytvoření hráče - zaručuje, že proměnná není undefined
            const player = add([
                sprite("player"),
                pos(80, 300), // Výchozí pozice
                area(),
                body(),
                anchor("center"),
                "player"
            ]);

            let score = 0;
            const SPEED = 300;
            const JUMP_FORCE = 700;

            const scoreLabel = add([
                text("Skóre: 0", { size: 24 }),
                pos(24, 24),
                fixed(),
                z(100)
            ]);

            // Tlačítka
            add([ rect(80, 80, { radius: 10 }), pos(20, height() - 100), color(0, 0, 0), opacity(0.3), fixed() ]);
            add([ text("<", { size: 40 }), pos(45, height() - 80), fixed() ]);
            add([ rect(80, 80, { radius: 10 }), pos(120, height() - 100), color(0, 0, 0), opacity(0.3), fixed() ]);
            add([ text(">", { size: 40 }), pos(145, height() - 80), fixed() ]);
            add([ rect(80, 80, { radius: 40 }), pos(width() - 100, height() - 100), color(0, 0, 0), opacity(0.3), fixed() ]);
            add([ text("^", { size: 40 }), pos(width() - 75, height() - 80), fixed() ]);

            let moveDirection = 0;

            onTouchStart((id, pos) => {
                if (pos.x > width() - 120 && pos.y > height() - 120) {
                    if (player.isGrounded()) player.jump(JUMP_FORCE);
                } else if (pos.x > 10 && pos.x < 110 && pos.y > height() - 120) {
                    moveDirection = -1;
                } else if (pos.x > 110 && pos.x < 210 && pos.y > height() - 120) {
                    moveDirection = 1;
                }
            });

            onTouchEnd((id, pos) => { moveDirection = 0; });
            onKeyDown("left", () => moveDirection = -1);
            onKeyDown("right", () => moveDirection = 1);
            onKeyRelease(["left", "right"], () => moveDirection = 0);
            onKeyPress(["space", "up"], () => { if (player.isGrounded()) player.jump(JUMP_FORCE); });

            onUpdate(() => {
                if (moveDirection < 0) player.move(-SPEED, 0);
                if (moveDirection > 0) player.move(SPEED, 0);

                let camX = Math.max(width() / 2, player.pos.x);
                camPos(camX, height() / 2);

                if (player.pos.y > height() + 100) { go("game"); }
            });

            // Kolize
            player.onCollide("coin", (c) => {
                destroy(c);
                score++;
                scoreLabel.text = `Skóre: ${score}`;
            });

            player.onCollide("danger", () => { go("game"); });
            player.onCollide("finish", () => { go("win", score); });
        });

        scene("win", (score) => {
            add([
                text(`VYHRAL JSI!\n\nSkóre: ${score}\n\nDotkni se pro restart`, { align: "center" }),
                pos(width() / 2, height() / 2),
                anchor("center"),
            ]);
            onTouchStart(() => go("game"));
            onKeyPress("space", () => go("game"));
        });

        go("game");
    </script>
</body>
</html>
