<!DOCTYPE html>
<html lang="cs">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Advanced Geo-Latency Radar</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <style>
        body, html { margin: 0; padding: 0; height: 100%; font-family: -apple-system, sans-serif; background: #0a0a0a; color: #00ff00; overflow: hidden; }
        #map { height: 100vh; width: 100vw; z-index: 1; }
        
        .panel {
            position: absolute; z-index: 1000;
            background: rgba(15, 15, 20, 0.9); border: 1px solid #333;
            padding: 15px; border-radius: 8px; box-shadow: 0 4px 20px rgba(0,0,0,0.8);
            backdrop-filter: blur(5px);
        }

        /* Levý panel - Filtry a Ovládání */
        #control-panel { top: 20px; left: 20px; width: 280px; max-height: 90vh; overflow-y: auto; }
        
        /* Pravý panel - Debug a Výsledky */
        #results-panel { top: 20px; right: 20px; width: 320px; display: flex; flex-direction: column; }
        
        h2 { margin: 0 0 10px 0; font-size: 15px; color: #fff; text-transform: uppercase; border-bottom: 1px solid #333; padding-bottom: 5px;}
        h3 { margin: 10px 0 5px 0; font-size: 12px; color: #8be9fd; text-transform: uppercase; }
        
        label { display: block; font-size: 13px; color: #ccc; margin-bottom: 4px; cursor: pointer; }
        input[type="checkbox"] { margin-right: 8px; accent-color: #0078FF; }
        select { width: 100%; padding: 6px; background: #222; color: #fff; border: 1px solid #444; border-radius: 4px; margin-top: 5px; font-size: 13px; }
        
        .stat-row { display: flex; justify-content: space-between; font-size: 13px; margin-bottom: 3px; font-family: monospace; }
        .ping-green { color: #50fa7b; } .ping-yellow { color: #f1fa8c; } .ping-red { color: #ff5555; }
        
        #debug-log { height: 150px; overflow-y: auto; font-family: monospace; font-size: 11px; color: #aaa; border-top: 1px solid #333; margin-top: 10px; padding-top: 5px; }
        .log-err { color: #ff5555; } .log-ok { color: #50fa7b; } .log-info { color: #8be9fd; }
        
        #estimated-loc { margin-top: 15px; padding: 10px; background: rgba(0, 120, 255, 0.1); border-left: 3px solid #0078FF; font-size: 13px; line-height: 1.4; }
        
        /* Scrollbary */
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-thumb { background: #555; border-radius: 3px; }
    </style>
</head>
<body>

    <div id="control-panel" class="panel">
        <h2>Nastavení Cílů</h2>
        
        <h3>Typ uzlu</h3>
        <label><input type="checkbox" id="chk-type-registry" onchange="buildFilters()"> 🏢 Národní registry (NIC)</label>
        <label><input type="checkbox" id="chk-type-university" checked onchange="buildFilters()"> 🎓 Univerzitní AS (NREN)</label>

        <h3>Kontinent</h3>
        <label><input type="checkbox" class="chk-cont" value="Evropa" checked onchange="buildFilters()"> Evropa</label>
        <label><input type="checkbox" class="chk-cont" value="Severní Amerika" onchange="buildFilters()"> Severní Amerika</label>
        <label><input type="checkbox" class="chk-cont" value="Jižní Amerika" onchange="buildFilters()"> Jižní Amerika</label>
        <label><input type="checkbox" class="chk-cont" value="Asie" onchange="buildFilters()"> Asie</label>
        <label><input type="checkbox" class="chk-cont" value="Afrika" onchange="buildFilters()"> Afrika</label>
        <label><input type="checkbox" class="chk-cont" value="Oceánie" onchange="buildFilters()"> Oceánie</label>

        <h3>Země (V rámci výběru)</h3>
        <select id="sel-country" onchange="applyCountryFilter()">
            <option value="ALL">-- Všechny dostupné země --</option>
        </select>
        
        <div style="margin-top: 15px; font-size: 12px; color: #888;">
            Aktivních cílů k měření: <b id="active-count" style="color:#fff;">0</b>
        </div>
    </div>

    <div id="results-panel" class="panel">
        <h2>Trilaterace & Latence</h2>
        <div id="status" style="font-size: 11px; color: #888; margin-bottom: 10px;">Čekám na zahájení...</div>
        
        <div id="top-nodes" style="min-height: 80px;"></div>

        <div id="estimated-loc">
            <b style="color:#fff;">Odhad polohy (Triangulace):</b><br>
            <span id="loc-coords" style="font-family: monospace;">Čekám na data...</span>
        </div>

        <div id="debug-log"></div>
    </div>

    <div id="map"></div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script>
        // --- MAPA A SKUTEČNÁ POLOHA ---
        const map = L.map('map').setView([48, 15], 4);
        L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png', { maxZoom: 19 }).addTo(map);

        const realLat = 50.369, realLon = 14.053;
        L.marker([realLat, realLon], {
            icon: L.divIcon({ className: '', html: "<div style='background:#f1c40f; width:12px; height:12px; border-radius:50%; box-shadow: 0 0 10px #f1c40f;'></div>", iconSize: [12, 12] })
        }).bindTooltip("Skutečná poloha (ČR)").addTo(map);

        // --- DATABÁZE UZLŮ ---
        const allNodes = [
            // UNIVERZITY (Unicast / Vlastní AS z analýzy)
            { id: "UNI-CZ1", name: "UK Praha", type: "university", country: "Česko", continent: "Evropa", url: "https://www.cuni.cz/favicon.ico", lat: 50.08, lon: 14.43 },
            { id: "UNI-CZ2", name: "ČVUT Praha", type: "university", country: "Česko", continent: "Evropa", url: "https://www.cvut.cz/favicon.ico", lat: 50.10, lon: 14.39 },
            { id: "UNI-CZ3", name: "MUNI Brno", type: "university", country: "Česko", continent: "Evropa", url: "https://www.muni.cz/favicon.ico", lat: 49.20, lon: 16.60 },
            { id: "UNI-AT1", name: "TU Wien", type: "university", country: "Rakousko", continent: "Evropa", url: "https://tuwien.ac.at/favicon.ico", lat: 48.20, lon: 16.37 },
            { id: "UNI-AT2", name: "Uni Graz", type: "university", country: "Rakousko", continent: "Evropa", url: "https://kfunigraz.ac.at/favicon.ico", lat: 47.07, lon: 15.43 },
            { id: "UNI-DE1", name: "TU Köln", type: "university", country: "Německo", continent: "Evropa", url: "https://th-koeln.de/favicon.ico", lat: 50.93, lon: 6.95 },
            { id: "UNI-DE2", name: "FH Münster", type: "university", country: "Německo", continent: "Evropa", url: "https://fh-muenster.de/favicon.ico", lat: 51.96, lon: 7.62 },
            { id: "UNI-IT1", name: "Uni Torino", type: "university", country: "Itálie", continent: "Evropa", url: "https://unito.it/favicon.ico", lat: 45.07, lon: 7.68 },
            { id: "UNI-IT2", name: "Uni Udine", type: "university", country: "Itálie", continent: "Evropa", url: "https://uniud.it/favicon.ico", lat: 46.06, lon: 13.23 },
            { id: "UNI-HR1", name: "Uni Zagreb", type: "university", country: "Chorvatsko", continent: "Evropa", url: "https://unizg.hr/favicon.ico", lat: 45.81, lon: 15.98 },
            { id: "UNI-NL1", name: "TU Delft", type: "university", country: "Nizozemsko", continent: "Evropa", url: "https://tudelft.nl/favicon.ico", lat: 52.01, lon: 4.35 },
            { id: "UNI-PL1", name: "AGH Kraków", type: "university", country: "Polsko", continent: "Evropa", url: "https://agh.edu.pl/favicon.ico", lat: 50.06, lon: 19.92 },
            { id: "UNI-FI1", name: "Aalto Uni", type: "university", country: "Finsko", continent: "Evropa", url: "https://hkkk.fi/favicon.ico", lat: 60.18, lon: 24.83 },
            
            { id: "UNI-AR1", name: "Uni Buenos Aires", type: "university", country: "Argentina", continent: "Jižní Amerika", url: "https://uba.ar/favicon.ico", lat: -34.60, lon: -58.38 },
            { id: "UNI-AR2", name: "Uni Cordoba", type: "university", country: "Argentina", continent: "Jižní Amerika", url: "https://unc.edu.ar/favicon.ico", lat: -31.42, lon: -64.18 },
            { id: "UNI-BR1", name: "Uni Bahia", type: "university", country: "Brazílie", continent: "Jižní Amerika", url: "https://ufba.br/favicon.ico", lat: -12.97, lon: -38.51 },
            
            { id: "UNI-AU1", name: "ANU Canberra", type: "university", country: "Austrálie", continent: "Oceánie", url: "https://anu.edu.au/favicon.ico", lat: -35.27, lon: 149.11 },
            { id: "UNI-AU2", name: "Deakin Uni", type: "university", country: "Austrálie", continent: "Oceánie", url: "https://deakin.edu.au/favicon.ico", lat: -38.14, lon: 144.36 },
            
            { id: "UNI-BD1", name: "BUET Dhaka", type: "university", country: "Bangladéš", continent: "Asie", url: "https://buet.ac.bd/favicon.ico", lat: 23.72, lon: 90.39 },
            { id: "UNI-IR1", name: "Amirkabir Uni", type: "university", country: "Írán", continent: "Asie", url: "https://aut.ac.ir/favicon.ico", lat: 35.70, lon: 51.40 },
            { id: "UNI-CN1", name: "Southeast Uni", type: "university", country: "Čína", continent: "Asie", url: "https://seu.edu.cn/favicon.ico", lat: 32.06, lon: 118.79 },
            
            { id: "UNI-KE1", name: "Kenyatta Uni", type: "university", country: "Keňa", continent: "Afrika", url: "https://ku.ac.ke/favicon.ico", lat: -1.18, lon: 36.93 },
            { id: "UNI-DZ1", name: "Uni Constantine", type: "university", country: "Alžírsko", continent: "Afrika", url: "https://umc.edu.dz/favicon.ico", lat: 36.36, lon: 6.61 },

            // REGISTRY (Ověřené UNICAST z předchozích analýz)
            { id: "NIC-CZ", name: "NIC Česko", type: "registry", country: "Česko", continent: "Evropa", url: "https://nic.cz/favicon.ico", lat: 50.08, lon: 14.43 },
            { id: "NIC-DE", name: "NIC Německo", type: "registry", country: "Německo", continent: "Evropa", url: "https://nic.de/favicon.ico", lat: 52.52, lon: 13.40 },
            { id: "NIC-FR", name: "NIC Francie", type: "registry", country: "Francie", continent: "Evropa", url: "https://nic.fr/favicon.ico", lat: 48.85, lon: 2.35 },
            { id: "NIC-IT", name: "NIC Itálie", type: "registry", country: "Itálie", continent: "Evropa", url: "https://nic.it/favicon.ico", lat: 41.90, lon: 12.49 },
            { id: "NIC-CH", name: "NIC Švýcarsko", type: "registry", country: "Švýcarsko", continent: "Evropa", url: "https://nic.ch/favicon.ico", lat: 46.94, lon: 7.44 },
            { id: "NIC-AR", name: "NIC Argentina", type: "registry", country: "Argentina", continent: "Jižní Amerika", url: "https://nic.ar/favicon.ico", lat: -34.60, lon: -58.38 },
            { id: "NIC-BR", name: "NIC Brazílie", type: "registry", country: "Brazílie", continent: "Jižní Amerika", url: "https://registro.br/favicon.ico", lat: -15.79, lon: -47.88 },
            { id: "NIC-MX", name: "NIC Mexiko", type: "registry", country: "Mexiko", continent: "Severní Amerika", url: "https://nic.mx/favicon.ico", lat: 19.43, lon: -99.13 },
            { id: "NIC-JP", name: "NIC Japonsko", type: "registry", country: "Japonsko", continent: "Asie", url: "https://jprs.jp/favicon.ico", lat: 35.68, lon: 139.76 },
            { id: "NIC-ZA", name: "NIC J. Afrika", type: "registry", country: "J. Afrika", continent: "Afrika", url: "https://nic.za/favicon.ico", lat: -25.74, lon: 28.18 },
            { id: "NIC-AU", name: "NIC Austrálie", type: "registry", country: "Austrálie", continent: "Oceánie", url: "https://nic.au/favicon.ico", lat: -35.28, lon: 149.13 }
        ];

        let activeNodes = [];
        let markers = {};
        let myLocationMarker = null;
        let polyline = L.polyline([], {color: '#0078FF', weight: 2, opacity: 0.6, dashArray: '4,4'}).addTo(map);
        let pathHistory = [];

        function log(msg, type="info") {
            const el = document.getElementById('debug-log');
            const time = new Date().toLocaleTimeString('cs-CZ');
            let color = type === 'error' ? 'log-err' : (type === 'success' ? 'log-ok' : 'log-info');
            el.innerHTML += `<div><span style="color:#555">[${time}]</span> <span class="${color}">${msg}</span></div>`;
            el.scrollTop = el.scrollHeight;
        }

        // --- FILTROVACÍ LOGIKA ---
        function buildFilters() {
            // 1. Získání stavu checkboxů
            const allowReg = document.getElementById('chk-type-registry').checked;
            const allowUni = document.getElementById('chk-type-university').checked;
            const activeConts = Array.from(document.querySelectorAll('.chk-cont:checked')).map(cb => cb.value);

            // 2. Před-filtrace pro výběr zemí
            let availableCountries = new Set();
            let preFilteredNodes = allNodes.filter(n => {
                let typeOk = (n.type === 'registry' && allowReg) || (n.type === 'university' && allowUni);
                let contOk = activeConts.includes(n.continent);
                if (typeOk && contOk) availableCountries.add(n.country);
                return typeOk && contOk;
            });

            // 3. Aktualizace roletky Zemí
            const selCountry = document.getElementById('sel-country');
            const currentSel = selCountry.value;
            selCountry.innerHTML = '<option value="ALL">-- Všechny dostupné země --</option>';
            Array.from(availableCountries).sort().forEach(c => {
                let opt = document.createElement('option');
                opt.value = c; opt.innerText = c;
                if (c === currentSel) opt.selected = true;
                selCountry.appendChild(opt);
            });

            applyCountryFilter(preFilteredNodes);
        }

        function applyCountryFilter(preFilteredNodes = null) {
            const allowReg = document.getElementById('chk-type-registry').checked;
            const allowUni = document.getElementById('chk-type-university').checked;
            const activeConts = Array.from(document.querySelectorAll('.chk-cont:checked')).map(cb => cb.value);
            const selCountry = document.getElementById('sel-country').value;

            // Vyčištění starých markerů
            Object.values(markers).forEach(m => map.removeLayer(m));
            markers = {};

            // Finální filtrace
            activeNodes = allNodes.filter(n => {
                let typeOk = (n.type === 'registry' && allowReg) || (n.type === 'university' && allowUni);
                let contOk = activeConts.includes(n.continent);
                let countryOk = (selCountry === "ALL" || n.country === selCountry);
                return typeOk && contOk && countryOk;
            });

            document.getElementById('active-count').innerText = activeNodes.length;
            log(`Filtry aplikovány. Aktivních cílů: ${activeNodes.length}`, "info");

            // Vykreslení nových markerů
            activeNodes.forEach(node => {
                let iconColor = node.type === 'university' ? '#8be9fd' : '#bd93f9';
                markers[node.id] = L.circleMarker([node.lat, node.lon], {
                    radius: 4, fillColor: iconColor, color: "#000", weight: 1, fillOpacity: 0.6
                }).bindTooltip(`${node.name} (${node.type})`).addTo(map);
            });
        }

        // --- MĚŘÍCÍ LOGIKA ---
        async function ping(node) {
            const start = performance.now();
            try {
                await fetch(node.url + "?no-cache=" + Math.random(), { mode: 'no-cors', cache: 'no-store' });
                return performance.now() - start;
            } catch (e) { return 9999; }
        }

        async function scanNetwork() {
            if (activeNodes.length === 0) {
                document.getElementById('status').innerText = "Žádné uzly k měření. Upravte filtry.";
                return;
            }

            document.getElementById('status').innerText = `Odesílám pakety na ${activeNodes.length} cílů...`;
            
            let promises = activeNodes.map(async (node) => {
                let time = await ping(node);
                return { ...node, time: time };
            });

            let results = await Promise.all(promises);
            results = results.filter(r => r.time < 9999).sort((a, b) => a.time - b.time);

            document.getElementById('status').innerText = `Odpovědělo ${results.length} uzlů. Reset za 15s.`;

            let topHtml = "";
            results.forEach((r, index) => {
                let color = "#ff5555"; let cssClass = "ping-red";
                if (r.time < 60) { color = "#50fa7b"; cssClass = "ping-green"; }
                else if (r.time < 150) { color = "#f1fa8c"; cssClass = "ping-yellow"; } 

                if(markers[r.id]) markers[r.id].setStyle({ fillColor: color, radius: index < 4 ? 8 : 4, fillOpacity: 0.9 });

                if (index < 5) {
                    topHtml += `<div class="stat-row"><span>${r.name}</span><span class="${cssClass}">${Math.round(r.time)} ms</span></div>`;
                }
            });
            document.getElementById('top-nodes').innerHTML = topHtml;

            // --- VÝPOČET POLOHY ---
            // Použijeme až 4 nejrychlejší uzly
            const limit = Math.min(results.length, 4);
            if (limit > 0) {
                let sumWeights = 0, sumLat = 0, sumLon = 0;
                
                for (let i = 0; i < limit; i++) {
                    let r = results[i];
                    let weight = 1 / Math.pow(r.time, 2); 
                    sumWeights += weight;
                    sumLat += r.lat * weight;
                    sumLon += r.lon * weight;
                }

                let estLat = sumLat / sumWeights;
                let estLon = sumLon / sumWeights;

                let dLat = (estLat - realLat) * 111; 
                let dLon = (estLon - realLon) * 71;  
                let errorKm = Math.sqrt(dLat*dLat + dLon*dLon);

                document.getElementById('loc-coords').innerHTML = `LAT: <span style="color:#8be9fd">${estLat.toFixed(4)}</span><br>LON: <span style="color:#8be9fd">${estLon.toFixed(4)}</span><br><br><span style="color:#aaa; font-size:11px;">Odchylka: ~${Math.round(errorKm)} km</span>`;
                log(`Odhad z ${limit} uzlů. Odchylka: ${Math.round(errorKm)} km`, "success");

                pathHistory.push([estLat, estLon]);
                if (pathHistory.length > 20) pathHistory.shift();
                polyline.setLatLngs(pathHistory);

                if (!myLocationMarker) {
                    const icon = L.divIcon({
                        className: '', html: "<div style='background:#0078FF; width:16px; height:16px; border-radius:50%; border:2px solid #fff; box-shadow: 0 0 15px #0078FF;'></div>", iconSize: [20, 20]
                    });
                    myLocationMarker = L.marker([estLat, estLon], {icon: icon}).bindTooltip("Odhad polohy").addTo(map);
                } else {
                    myLocationMarker.setLatLng([estLat, estLon]);
                }
            }
        }

        // Inicializace
        buildFilters();
        setTimeout(scanNetwork, 1000);
        setInterval(scanNetwork, 15000); 
    </script>
</body>
</html>
