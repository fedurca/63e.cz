        #map { height: 100vh; width: 100vw; z-index: 1; }
        
        #overlay {
            position: absolute; top: 20px; left: 20px; z-index: 1000;
            background: rgba(10, 10, 15, 0.9); border: 1px solid #333;
            padding: 15px; border-radius: 8px; width: 330px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.8); backdrop-filter: blur(5px);
        }
        
        #debug-panel {
            position: absolute; bottom: 20px; right: 20px; z-index: 1000;
            background: rgba(10, 10, 15, 0.9); border: 1px solid #333;
            padding: 10px; border-radius: 8px; width: 350px; height: 250px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.8); display: flex; flex-direction: column;
        }

        #debug-log {
            flex: 1; overflow-y: auto; font-family: monospace; font-size: 11px;
            color: #aaa; padding-right: 5px; margin-top: 5px; border-top: 1px solid #333; padding-top: 5px;
        }
        
        h2 { margin: 0 0 10px 0; font-size: 14px; color: #fff; text-transform: uppercase; letter-spacing: 1px; border-bottom: 1px solid #333; padding-bottom: 5px;}
        .stat-row { display: flex; justify-content: space-between; font-size: 13px; margin-bottom: 5px; font-family: monospace; }
        
        #estimated-loc {
            margin-top: 15px; padding: 10px; background: rgba(0, 120, 255, 0.1);
            border-left: 3px solid #0078FF; font-size: 13px; line-height: 1.4;
        }
        
        .ping-green { color: #2ed573; }
        .ping-yellow { color: #feca57; }
        .ping-red { color: #ff4757; }
        .log-err { color: #ff4757; }
        .log-ok { color: #2ed573; }
        .log-info { color: #00d2d3; }

        #debug-log::-webkit-scrollbar { width: 5px; }
        #debug-log::-webkit-scrollbar-thumb { background: #555; border-radius: 3px; }
    </style>
</head>

        function log(msg, type="info") {
            const logWindow = document.getElementById('debug-log');
            const time = new Date().toLocaleTimeString('cs-CZ');
            let colorClass = type === 'error' ? 'log-err' : (type === 'success' ? 'log-ok' : 'log-info');
            logWindow.innerHTML += `<div><span style="color:#555">[${time}]</span> <span class="${colorClass}">${msg}</span></div>`;
            logWindow.scrollTop = logWindow.scrollHeight;
        }

        async function ping(node) {
            const start = performance.now();
            try {
                await fetch(node.url + "?t=" + Math.random(), { mode: 'no-cors', cache: 'no-store' });
                return performance.now() - start;
            } catch (e) { 
                return 9999; 
            }
        }

        async function scanNetwork() {
            document.getElementById('status').innerText = `Skenuji ${allNodes.length} uzlů (ČR + Svět)...`;
            log("--- ZAHÁJENO NOVÉ MĚŘENÍ ---", "info");

            let promises = allNodes.map(async (node) => {
                let time = await ping(node);
                return { ...node, time: time };
            });

            let results = await Promise.all(promises);
            results = results.filter(r => r.time < 9999).sort((a, b) => a.time - b.time);

            document.getElementById('status').innerText = `Úspěch: ${results.length} uzlů. Další sken za 15s.`;

            let topHtml = "";
            results.forEach((r, index) => {
                let color = "#ff4757"; 
                let cssClass = "ping-red";
                if (r.time < 40) { color = "#2ed573"; cssClass = "ping-green"; }
                else if (r.time < 90) { color = "#feca57"; cssClass = "ping-yellow"; } 

                markers[r.id].setStyle({ fillColor: color, radius: index < 7 ? 7 : 3, fillOpacity: 0.9 });

                if (index < 7) { // Nyní vypisujeme 7 nejrychlejších kvůli detailnějšímu ČR
                    topHtml += `<div class="stat-row"><span>${r.name}</span><span class="${cssClass}">${Math.round(r.time)} ms</span></div>`;
                }
            });
            document.getElementById('top-nodes').innerHTML = topHtml;

            // Výpočet pozice (Použijeme 7 nejrychlejších uzlů pro jemnější přesnost)
            if (results.length >= 7) {
                let sumWeights = 0, sumLat = 0, sumLon = 0;
                
                for (let i = 0; i < 7; i++) {
                    let r = results[i];
                    let weight = 1 / Math.pow(r.time, 2); 
                    sumWeights += weight;
                    sumLat += r.lat * weight;
                    sumLon += r.lon * weight;
                }

                let estLat = sumLat / sumWeights;
                let estLon = sumLon / sumWeights;

                // Odchylka
                let dLat = (estLat - realLat) * 111; 
                let dLon = (estLon - realLon) * 71;  
                let errorKm = Math.sqrt(dLat*dLat + dLon*dLon);

                document.getElementById('loc-coords').innerHTML = `LAT: <span style="color:#00d2d3">${estLat.toFixed(4)}</span><br>LON: <span style="color:#00d2d3">${estLon.toFixed(4)}</span><br><br><span style="color:#888; font-size:11px;">Odchylka od reality: ~${Math.round(errorKm)} km</span>`;
                log(`Výpočet polohy dokončen. Odchylka: ${Math.round(errorKm)} km`, "info");

                // Uložení do historie pro trajektorii
                trajectoryPath.push([estLat, estLon]);
                if (trajectoryPath.length > 30) trajectoryPath.shift(); // Ponechat jen posledních 30 měření
                
                polyline.setLatLngs(trajectoryPath); // Vykreslení čáry historie

                if (!myLocationMarker) {
                    const icon = L.divIcon({
                        className: 'custom-div-icon',
                        html: "<div style='background-color:#0078FF; width:16px; height:16px; border-radius:50%; border:3px solid white; box-shadow: 0 0 20px #0078FF;'></div>",
                        iconSize: [22, 22], iconAnchor: [11, 11]
                    });
                    myLocationMarker = L.marker([estLat, estLon], {icon: icon})
                        .bindTooltip("<b>Aktuální odhad</b>", {permanent: true, direction: 'top'})
                        .addTo(map);
                } else {
                    myLocationMarker.setLatLng([estLat, estLon]);
                }
            }
        }

        setTimeout(scanNetwork, 1000);
        setInterval(scanNetwork, 15000); 
    </script>
</body>
</html>
