<html lang="cs">
<head>
    <meta charset="UTF-8">

    <style>
        body, html { margin: 0; padding: 0; height: 100%; font-family: -apple-system, sans-serif; background: #0a0a0a; color: #00ff00; overflow: hidden; }
        #map { height: 100vh; width: 100vw; z-index: 1; }
        
        .panel {
            position: absolute; z-index: 1000;
            background: rgba(15, 15, 20, 0.9); border: 1px solid #333;
            padding: 15px; border-radius: 8px; box-shadow: 0 4px 20px rgba(0,0,0,0.8);
            backdrop-filter: blur(5px);
        }

        #control-panel { top: 20px; left: 20px; width: 280px; max-height: 90vh; display: flex; flex-direction: column; }
        #country-filters { flex: 1; overflow-y: auto; background: rgba(0,0,0,0.5); padding: 10px; border: 1px solid #444; border-radius: 4px; margin-top: 5px; max-height: 200px; }
        
        #results-panel { top: 20px; right: 20px; width: 320px; display: flex; flex-direction: column; max-height: 90vh; }
        
        h2 { margin: 0 0 10px 0; font-size: 15px; color: #fff; text-transform: uppercase; border-bottom: 1px solid #333; padding-bottom: 5px;}
        h3 { margin: 10px 0 5px 0; font-size: 12px; color: #8be9fd; text-transform: uppercase; }
        
        label { display: block; font-size: 13px; color: #ccc; margin-bottom: 5px; cursor: pointer; }
        input[type="checkbox"] { margin-right: 8px; accent-color: #0078FF; }
        
        .stat-row { display: flex; justify-content: space-between; font-size: 13px; margin-bottom: 3px; font-family: monospace; }
        .ping-green { color: #50fa7b; } .ping-yellow { color: #f1fa8c; } .ping-orange { color: #ffb86c; } .ping-red { color: #ff5555; }
        
        #debug-log { flex: 1; overflow-y: auto; font-family: monospace; font-size: 11px; color: #aaa; border-top: 1px solid #333; margin-top: 10px; padding-top: 5px; min-height: 150px; }
        .log-err { color: #ff5555; } .log-ok { color: #50fa7b; } .log-info { color: #8be9fd; }
        
        #estimated-loc { margin-top: 15px; padding: 10px; background: rgba(0, 120, 255, 0.1); border-left: 3px solid #0078FF; font-size: 13px; line-height: 1.4; flex-shrink: 0; }
        
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-thumb { background: #555; border-radius: 3px; }
        
        .leaflet-popup-content-wrapper { background: rgba(15,15,20,0.95); color: #fff; border: 1px solid #444; border-radius: 6px; font-family: monospace; font-size: 12px;}
        .leaflet-popup-tip { background: rgba(15,15,20,0.95); border: 1px solid #444; }

": 65.0, "lon": -18.0}, {"id": "NIC-JM", "name": "NIC Jamaica", "type": "registry", "country": "Jamaica", "continent": "Severn\u00ed Amerika", "url": "https://nic.jm/favicon.ico", "lat": 18.25, "lon": -77.5}, {"id": "NIC-KZ", "name": "NIC Kazakhstan", "type": "registry", "country": "Kazakhstan", "continent": "Asie", "url": "https://nic.kz/favicon.ico", "lat": 48.0196, "lon": 66.9237}, {"id": "NIC-LA", "name": "NIC Laos", "type": "registry", "country": "Laos", "continent": "Asie", "url": "https://nic.la/favicon.ico", "lat": 18.0, "lon": 105.0}, {"id": "NIC-LK", "name": "NIC Sri Lanka", "type": "registry", "country": "Sri Lanka", "continent": "Asie", "url": "https://nic.lk/favicon.ico", "lat": 7.0, "lon": 81.0}, {"id": "NIC-LS", "name": "NIC Lesotho", "type": "registry", "country": "Lesotho", "continent": "Afrika", "url": "https://nic.ls/favicon.ico", "lat": -29.5, "lon": 28.5}, {"id": "NIC-LT", "name": "NIC Lithuania", "type": "registry", "country": "Lithuania", "continent": "Evropa", "url": "https://nic.lt/favicon.ico", "lat": 56.0, "lon": 24.0}, {"id": "NIC-LV", "name": "NIC Latvia", "type": "registry", "country": "Latvia", "continent": "Evropa", "url": "https://nic.lv/favicon.ico", "lat": 57.0, "lon": 25.0}, {"id": "NIC-LY", "name": "NIC Libya", "type": "registry", "country": "Libya", "continent": "Afrika", "url": "https://nic.ly/favicon.ico", "lat": 25.0, "lon": 17.0}, {"id": "NIC-MG", "name": "NIC Madagascar", "type": "registry", "country": "Madagascar", "continent": "Afrika", "url": "https://nic.mg/favicon.ico", "lat": -20.0, "lon": 47.0}, {"id": "NIC-MK", "name": "NIC North Macedonia", "type": "registry", "country": "North Macedonia", "continent": "Evropa", "url": "https://nic.mk/favicon.ico", "lat": 41.83333333, "lon": 22.0}, {"id": "NIC-MN", "name": "NIC Mongolia", "type": "registry", "country": "Mongolia", "continent": "Asie", "url": "https://nic.mn/favicon.ico", "lat": 46.0, "lon": 105.0}, {"id": "NIC-MR", "name": "NIC Mauritania", "type": "registry", "country": "Mauritania", "continent": "Afrika", "url": "https://nic.mr/favicon.ico", "lat": 20.0, "lon": -12.0}, {"id": "NIC-MS", "name": "NIC Montserrat", "type": "registry", "country": "Montserrat", "continent": "Severn\u00ed Amerika", "url": "https://nic.ms/favicon.ico", "lat": 16.75, "lon": -62.2}, {"id": "NIC-MT", "name": "NIC Malta", "type": "registry", "country": "Malta", "continent": "Evropa", "url": "https://nic.mt/favicon.ico", "lat": 35.9375, "lon": 14.3754}, {"id": "NIC-MZ", "name": "NIC Mozambique", "type": "registry", "country": "Mozambique", "continent": "Afrika", "url": "https://nic.mz/favicon.ico", "lat": -18.25, "lon": 35.0}, {"id": "NIC-RO", "name": "NIC Romania", "type": "registry", "country": "Romania", "continent": "Evropa", "url": "https://nic.ro/favicon.ico", "lat": 46.0, "lon": 25.0}];
        
        allNodes.forEach(n => {
            n.stats = { min: Infinity, max: 0, sum: 0, count: 0, avg: 0, fails: 0, traffic: 0 };
        });

        let activeNodes = [];
        let markers = {};
        
        let linesLayer = L.layerGroup().addTo(map);
        let markersLayer = L.layerGroup().addTo(map);
        let myLocationMarker = null;
        
        // Trajektorie odhadů (Zvýrazněna růžově)
        let pathHistory = [];
        let polyline = L.polyline([], {color: '#ff79c6', weight: 3, opacity: 0.8, dashArray: '5,5'}).addTo(map);

        function log(msg, type="info") {
            const el = document.getElementById('debug-log');
            const time = new Date().toLocaleTimeString('cs-CZ');
            let color = type === 'error' ? 'log-err' : (type === 'success' ? 'log-ok' : 'log-info');
            el.innerHTML += `<div><span style="color:#555">[${time}]</span> <span class="${color}">${msg}</span></div>`;
            el.scrollTop = el.scrollHeight;
        }

        // Haversine formule pro výpočet vzdálenosti v KM
        function getDistanceKm(lat1, lon1, lat2, lon2) {
            const R = 6371; 
            const dLat = (lat2 - lat1) * Math.PI / 180;
            const dLon = (lon2 - lon1) * Math.PI / 180;
            const a = Math.sin(dLat/2) * Math.sin(dLat/2) + Math.cos(lat1 * Math.PI / 180) * Math.cos(lat2 * Math.PI / 180) * Math.sin(dLon/2) * Math.sin(dLon/2);
            const c = 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a));
            return R * c;
        }

        function getPingColor(time) {
            if (time < 40) return '#50fa7b'; // Zelená (Nejrychlejší)
            if (time < 80) return '#f1fa8c'; // Žlutá
            if (time < 150) return '#ffb86c'; // Oranžová
            return '#ff5555'; // Červená (Nejpomalejší)
        }

        // --- FILTRY ---
        function setDefaultFilters() {
            document.getElementById('chk-type-university').checked = true;
            document.getElementById('chk-type-registry').checked = false;
            document.querySelectorAll('.chk-cont').forEach(cb => { cb.checked = (cb.value === "Evropa"); });
            buildFilters();
        }

        function toggleAllCountries(masterCheckbox) {
            document.querySelectorAll('.chk-country').forEach(cb => { cb.checked = masterCheckbox.checked; });
            applyCountryFilter();
        }

        function buildFilters() {
            const allowReg = document.getElementById('chk-type-registry').checked;
            const allowUni = document.getElementById('chk-type-university').checked;
            const activeConts = Array.from(document.querySelectorAll('.chk-cont:checked')).map(cb => cb.value);

            let availableCountries = new Set();
            allNodes.forEach(n => {
                let typeOk = (n.type === 'registry' && allowReg) || (n.type === 'university' && allowUni);
                let contOk = activeConts.includes(n.continent);
                if (typeOk && contOk) availableCountries.add(n.country);
            });

            const countryDiv = document.getElementById('country-filters');
            countryDiv.innerHTML = '';
            
            Array.from(availableCountries).sort().forEach(c => {
                let lbl = document.createElement('label');
                lbl.innerHTML = `<input type="checkbox" class="chk-country" value="${c}" checked onchange="applyCountryFilter()"> ${c}`;
                countryDiv.appendChild(lbl);
            });
            document.getElementById('chk-all-countries').checked = true;

            applyCountryFilter();
        }

        function updatePopup(node) {
            let reliability = node.stats.count > 0 ? Math.round((node.stats.count / (node.stats.count + node.stats.fails)) * 100) : 0;
            let content = `<b>${node.name}</b><br>
            Země: ${node.country} (${node.continent})<br>
            Typ: <span style="color:${node.type === 'registry' ? '#bd93f9' : '#8be9fd'}">${node.type === 'registry' ? 'NIC Registr' : 'Univerzita'}</span><br>
            <hr style="border:0; border-top:1px dashed #555; margin: 5px 0;">
            <b>Min:</b> ${node.stats.count > 0 ? Math.round(node.stats.min) : '-'} ms<br>
            <b>Max:</b> ${node.stats.count > 0 ? Math.round(node.stats.max) : '-'} ms<br>
            <b>Průměr:</b> ${node.stats.count > 0 ? Math.round(node.stats.avg) : '-'} ms<br>
            <b>Úspěšnost:</b> <span style="color:${reliability > 80 ? '#50fa7b' : '#ff5555'}">${reliability}%</span><br>
            <span style="font-size: 10px; color: #888;">Zátěž linky: ${Math.round(node.stats.traffic*10)/10} (Tloušťka: ${Math.max(1, Math.min(8, Math.round(node.stats.traffic * 1.5)))}px)</span>`;

            if(markers[node.id]) markers[node.id].bindPopup(content);
            if(node.line) node.line.bindPopup(content);
            
            if (markers[node.id] && markers[node.id].isPopupOpen()) markers[node.id].setPopupContent(content);
            if (node.line && node.line.isPopupOpen()) node.line.setPopupContent(content);
        }

        function applyCountryFilter() {
            const allowReg = document.getElementById('chk-type-registry').checked;
            const allowUni = document.getElementById('chk-type-university').checked;
            const activeConts = Array.from(document.querySelectorAll('.chk-cont:checked')).map(cb => cb.value);
            const activeCountries = Array.from(document.querySelectorAll('.chk-country:checked')).map(cb => cb.value);

            linesLayer.clearLayers();
            markersLayer.clearLayers();
            markers = {};

            activeNodes = allNodes.filter(n => {
                return ((n.type === 'registry' && allowReg) || (n.type === 'university' && allowUni)) && 
                       activeConts.includes(n.continent) && activeCountries.includes(n.country);
            });

            document.getElementById('active-count').innerText = activeNodes.length;
            log(`Filtry aplikovány. Cílů k měření: ${activeNodes.length}`, "info");

            activeNodes.forEach(node => {
                let color = node.type === 'university' ? '#8be9fd' : '#bd93f9';
                markers[node.id] = L.circleMarker([node.lat, node.lon], { radius: 4, fillColor: color, color: "#000", weight: 1, fillOpacity: 0.8 }).addTo(markersLayer);
                
                // Čáry začínají neviditelné
                node.line = L.polyline([[estLat, estLon], [node.lat, node.lon]], { color: color, weight: 1, opacity: 0 }).addTo(linesLayer);
                updatePopup(node);
            });
        }

        // --- VIZUALIZACE PAKETŮ ---
        function animatePacket(startLat, startLon, endLat, endLon, durationMs) {
            let packet = L.circleMarker([startLat, startLon], { radius: 3, fillColor: '#ffffff', color: '#00ffff', weight: 1, interactive: false, pane: 'tooltipPane' }).addTo(map);
            let start = performance.now();
            let animLen = Math.min(durationMs, 1500); 
            
            function frame(time) {
                let elapsed = time - start;
                let progress = elapsed / (animLen / 2); 
                
                if (progress <= 1) {
                    packet.setLatLng([startLat + (endLat - startLat) * progress, startLon + (endLon - startLon) * progress]);
                    requestAnimationFrame(frame);
                } else if (progress <= 2) {
                    let p2 = progress - 1;
                    packet.setLatLng([endLat + (startLat - endLat) * p2, endLon + (startLon - endLon) * p2]);
                    requestAnimationFrame(frame);
                } else {
                    map.removeLayer(packet);
                }
            }
            requestAnimationFrame(frame);
        }

        async function ping(node) {
            const start = performance.now();
            try {
                await fetch(node.url + "?no-cache=" + Math.random(), { mode: 'no-cors', cache: 'no-store' });
                let time = performance.now() - start;
                
                node.stats.count++;
                node.stats.sum += time;
                if(time < node.stats.min) node.stats.min = time;
                if(time > node.stats.max) node.stats.max = time;
                node.stats.avg = node.stats.sum / node.stats.count;
                
                // Zvýšíme tloušťku čáry (Intenzitu provozu)
                let reliability = node.stats.count / (node.stats.count + node.stats.fails);
                let lineColor = getPingColor(time);
                let newWeight = Math.max(1, Math.min(8, node.stats.traffic * 1.5));

                if (node.line) node.line.setStyle({ color: lineColor, opacity: Math.max(0.15, reliability * 0.7), weight: newWeight });
                if (markers[node.id]) markers[node.id].setStyle({ fillColor: lineColor });

                updatePopup(node);
                animatePacket(estLat, estLon, node.lat, node.lon, time);
                
                return time;
            } catch (e) { 
                node.stats.fails++;
                if (node.line) node.line.setStyle({ opacity: 0.05, weight: 1 }); 
                updatePopup(node);
                return 9999; 
            }
        }

        // --- HLAVNÍ LOGIKA & KASKÁDOVÝ SKEN ---
        let cascadePhase = 0; 
        let bestCont = null;
        let bestCtry = null;

        async function scanNetwork() {
            if (activeNodes.length === 0) return;
            
            let isCascade = document.getElementById('chk-cascade').checked;
            let targets = [];

            // Útlum provozu (Decay), staré linky se postupně ztenčují
            activeNodes.forEach(n => {
                n.stats.traffic *= 0.6; 
                if (n.line && n.stats.traffic < 0.5) n.line.setStyle({ opacity: 0 }); // Schovat prázdné
            });

            if (!isCascade) {
                targets = activeNodes;
                document.getElementById('status').innerText = `Plošný sken (Brute Force): ${targets.length} paketů...`;
                cascadePhase = 0; bestCont = null; bestCtry = null;
            } else {
                if (cascadePhase === 0 || !bestCont) {
                    document.getElementById('status').innerText = `Kaskáda (Makro): Hledám kontinent...`;
                    let byCont = {};
                    activeNodes.forEach(n => { if(!byCont[n.continent]) byCont[n.continent] = []; byCont[n.continent].push(n); });
                    for(let c in byCont) {
                        for(let i=0; i<Math.min(2, byCont[c].length); i++) targets.push(byCont[c][Math.floor(Math.random()*byCont[c].length)]);
                    }
                } else if (cascadePhase === 1 || !bestCtry) {
                    document.getElementById('status').innerText = `Kaskáda (Mezo): Skenuji země v ${bestCont}...`;
                    let byCtry = {};
                    activeNodes.filter(n=>n.continent===bestCont).forEach(n=>{
                        if(!byCtry[n.country]) byCtry[n.country]=[];
                        byCtry[n.country].push(n);
                    });
                    for(let c in byCtry) targets.push(byCtry[c][Math.floor(Math.random()*byCtry[c].length)]);
                    
                    let others = activeNodes.filter(n=>n.continent!==bestCont);
                    if(others.length) targets.push(others[Math.floor(Math.random()*others.length)]);
                } else {
                    document.getElementById('status').innerText = `Kaskáda (Mikro): Trianguluji v zemi: ${bestCtry}...`;
                    targets = activeNodes.filter(n=>n.country===bestCtry);
                    let contOthers = activeNodes.filter(n=>n.continent===bestCont && n.country!==bestCtry);
                    for(let i=0; i<Math.min(3, contOthers.length); i++) targets.push(contOthers[Math.floor(Math.random()*contOthers.length)]);
                    let worldOthers = activeNodes.filter(n=>n.continent!==bestCont);
                    if(worldOthers.length) targets.push(worldOthers[Math.floor(Math.random()*worldOthers.length)]);
                }
                targets = [...new Set(targets)];
            }

            let promises = targets.map(async (node) => {
                node.stats.traffic += 1; // Zvýšit traffic při odeslání
                let time = await ping(node);
                return { ...node, time: time };
            });

            let results = await Promise.all(promises);
            results = results.filter(r => r.time < 9999).sort((a, b) => a.time - b.time);

            // Změna stavu Kaskády podle vítěze
            if (isCascade && results.length > 0) {
                let best = results[0];
                if (cascadePhase === 0) { bestCont = best.continent; cascadePhase = 1; } 
                else if (cascadePhase === 1) {
                    if (best.continent === bestCont) { bestCtry = best.country; cascadePhase = 2; } 
                    else { bestCont = best.continent; cascadePhase = 1; }
                } 
                else if (cascadePhase === 2) {
                    if (best.country !== bestCtry) {
                        let bestInCtry = results.find(r=>r.country===bestCtry);
                        if (!bestInCtry || best.time < bestInCtry.time - 15) { bestCtry = best.country; bestCont = best.continent; }
                    }
                }
            }

            document.getElementById('status').innerText = `Odpovědělo ${results.length} uzlů. Reset za 15s.`;

            let topHtml = "";
            results.forEach((r, index) => {
                let cssClass = r.time < 40 ? "ping-green" : (r.time < 80 ? "ping-yellow" : (r.time < 150 ? "ping-orange" : "ping-red"));
                if (markers[r.id]) markers[r.id].setStyle({ radius: index < 5 ? 8 : 4 });
                if (index < 6) topHtml += `<div class="stat-row"><span>${r.name.substring(0, 18)}</span><span class="${cssClass}">${Math.round(r.time)} ms</span></div>`;
            });
            document.getElementById('top-nodes').innerHTML = topHtml;

            // --- IDW ALGORITMUS (KUBICKÁ PENALIZACE) ---
            let limit = Math.min(results.length, 8); 
            if (limit > 0) {
                let sumWeights = 0, sumLat = 0, sumLon = 0;
                let minPing = results[0].time;

                for (let i = 0; i < limit; i++) {
                    let r = results[i];
                    if (r.time > minPing + 150 && i > 2) continue; // Ignorovat extrémní outliery
                    let weight = 1 / Math.pow(Math.max(r.time, 5), 3); 
                    sumWeights += weight; sumLat += r.lat * weight; sumLon += r.lon * weight;
                }

                estLat = sumLat / sumWeights; estLon = sumLon / sumWeights;

                let errorKm = getDistanceKm(estLat, estLon, realLat, realLon);
                let showErr = document.getElementById('chk-real-loc').checked ? 'block' : 'none';
                let errHtml = `<span id="error-info" style="color:${errorKm < 150 ? '#50fa7b' : '#ffb86c'}; font-size:12px; display:${showErr}; margin-top:5px; border-top:1px dashed #444; padding-top:5px;"><b>Odchylka od reality: ~${Math.round(errorKm)} km</b></span>`;
                
                document.getElementById('loc-coords').innerHTML = `LAT: <span style="color:#8be9fd">${estLat.toFixed(4)}</span><br>LON: <span style="color:#8be9fd">${estLon.toFixed(4)}</span>${errHtml}`;

                pathHistory.push([estLat, estLon]);
                if (pathHistory.length > 30) pathHistory.shift();
                polyline.setLatLngs(pathHistory);

                if (!myLocationMarker) {
                    const icon = L.divIcon({ className: '', html: "<div style='background:#0078FF; width:16px; height:16px; border-radius:50%; border:2px solid #fff; box-shadow: 0 0 15px #0078FF;'></div>", iconSize: [20, 20] });
                    myLocationMarker = L.marker([estLat, estLon], {icon: icon, zIndexOffset: 1000}).bindTooltip("Odhad polohy").addTo(map);
                } else {
                    myLocationMarker.setLatLng([estLat, estLon]);
                }

                activeNodes.forEach(node => { if(node.line) node.line.setLatLngs([[estLat, estLon], [node.lat, node.lon]]); });
            }
        }

        setDefaultFilters();
        setTimeout(scanNetwork, 1000);
        setInterval(scanNetwork, 15000); 
    </script>
