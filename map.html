
<!DOCTYPE html>
<html lang="cs">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ultimate Geo-Latency Radar</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <style>
        body, html { margin: 0; padding: 0; height: 100%; font-family: -apple-system, sans-serif; background: #0a0a0a; color: #00ff00; overflow: hidden; }
        #map { height: 100vh; width: 100vw; z-index: 1; }
        
        .panel {
            position: absolute; z-index: 1000;
            background: rgba(15, 15, 20, 0.9); border: 1px solid #333;
            padding: 15px; border-radius: 8px; box-shadow: 0 4px 20px rgba(0,0,0,0.8);
            backdrop-filter: blur(5px);
        }

        #control-panel { top: 20px; left: 20px; width: 280px; max-height: 90vh; overflow-y: auto; }
        #results-panel { top: 20px; right: 20px; width: 320px; display: flex; flex-direction: column; }
        
        h2 { margin: 0 0 10px 0; font-size: 15px; color: #fff; text-transform: uppercase; border-bottom: 1px solid #333; padding-bottom: 5px;}
        h3 { margin: 10px 0 5px 0; font-size: 12px; color: #8be9fd; text-transform: uppercase; }
        
        label { display: block; font-size: 13px; color: #ccc; margin-bottom: 4px; cursor: pointer; }
        input[type="checkbox"] { margin-right: 8px; accent-color: #0078FF; }
        select { width: 100%; padding: 6px; background: #222; color: #fff; border: 1px solid #444; border-radius: 4px; margin-top: 5px; font-size: 13px; }
        
        .stat-row { display: flex; justify-content: space-between; font-size: 13px; margin-bottom: 3px; font-family: monospace; }
        .ping-green { color: #50fa7b; } .ping-yellow { color: #f1fa8c; } .ping-red { color: #ff5555; }
        
        #debug-log { height: 150px; overflow-y: auto; font-family: monospace; font-size: 11px; color: #aaa; border-top: 1px solid #333; margin-top: 10px; padding-top: 5px; }
        .log-err { color: #ff5555; } .log-ok { color: #50fa7b; } .log-info { color: #8be9fd; }
        
        #estimated-loc { margin-top: 15px; padding: 10px; background: rgba(0, 120, 255, 0.1); border-left: 3px solid #0078FF; font-size: 13px; line-height: 1.4; }
        
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-thumb { background: #555; border-radius: 3px; }
        
        /* Popup styly */
        .leaflet-popup-content-wrapper { background: rgba(15,15,20,0.95); color: #fff; border: 1px solid #444; border-radius: 6px; font-family: monospace; font-size: 12px;}
        .leaflet-popup-tip { background: rgba(15,15,20,0.95); border: 1px solid #444; }
    </style>
</head>
<body>

    <div id="control-panel" class="panel">
        <h2>Filtry Uzlů</h2>
        
        <h3>Typ uzlu</h3>
        <label><input type="checkbox" id="chk-type-registry" onchange="buildFilters()"> 🏢 Národní registry (NIC)</label>
        <label><input type="checkbox" id="chk-type-university" onchange="buildFilters()"> 🎓 Univerzitní AS (NREN)</label>

        <h3>Kontinent</h3>
        <label><input type="checkbox" class="chk-cont" value="Evropa" onchange="buildFilters()"> Evropa</label>
        <label><input type="checkbox" class="chk-cont" value="Severní Amerika" onchange="buildFilters()"> Severní Amerika</label>
        <label><input type="checkbox" class="chk-cont" value="Jižní Amerika" onchange="buildFilters()"> Jižní Amerika</label>
        <label><input type="checkbox" class="chk-cont" value="Asie" onchange="buildFilters()"> Asie</label>
        <label><input type="checkbox" class="chk-cont" value="Afrika" onchange="buildFilters()"> Afrika</label>
        <label><input type="checkbox" class="chk-cont" value="Oceánie" onchange="buildFilters()"> Oceánie</label>

        <h3>Země</h3>
        <select id="sel-country" onchange="applyCountryFilter()">
            <option value="ALL">-- Všechny dostupné země --</option>
        </select>
        
        <div style="margin-top: 15px; font-size: 12px; color: #888;">

        </div>
    </div>

        </div>

        <div id="debug-log"></div>
    </div>

    <div id="map"></div>

r/favicon.ico", "lat": 20.0, "lon": -12.0}, {"id": "NIC-MS", "name": "NIC Montserrat", "type": "registry", "country": "Montserrat", "continent": "Severn\u00ed Amerika", "url": "https://nic.ms/favicon.ico", "lat": 16.75, "lon": -62.2}, {"id": "NIC-MT", "name": "NIC Malta", "type": "registry", "country": "Malta", "continent": "Evropa", "url": "https://nic.mt/favicon.ico", "lat": 35.9375, "lon": 14.3754}, {"id": "NIC-MZ", "name": "NIC Mozambique", "type": "registry", "country": "Mozambique", "continent": "Afrika", "url": "https://nic.mz/favicon.ico", "lat": -18.25, "lon": 35.0}, {"id": "NIC-RO", "name": "NIC Romania", "type": "registry", "country": "Romania", "continent": "Evropa", "url": "https://nic.ro/favicon.ico", "lat": 46.0, "lon": 25.0}];
        
        allNodes.forEach(n => {
            n.stats = { min: Infinity, max: 0, sum: 0, count: 0, avg: 0 };
        });

        let activeNodes = [];
        let markers = {};
        
        let linesLayer = L.layerGroup().addTo(map);
        let markersLayer = L.layerGroup().addTo(map);
        let myLocationMarker = null;

        function log(msg, type="info") {
            const el = document.getElementById('debug-log');
            const time = new Date().toLocaleTimeString('cs-CZ');
            let color = type === 'error' ? 'log-err' : (type === 'success' ? 'log-ok' : 'log-info');
            el.innerHTML += `<div><span style="color:#555">[${time}]</span> <span class="${color}">${msg}</span></div>`;
            el.scrollTop = el.scrollHeight;
        }

        // --- VÝCHOZÍ NASTAVENÍ (JEN EVROPA A UNIVERZITY) ---
        function setDefaultFilters() {
            document.getElementById('chk-type-university').checked = true;
            document.getElementById('chk-type-registry').checked = false;
            document.querySelectorAll('.chk-cont').forEach(cb => {
                cb.checked = (cb.value === "Evropa");
            });
            buildFilters();
        }

        function buildFilters() {
            const allowReg = document.getElementById('chk-type-registry').checked;
            const allowUni = document.getElementById('chk-type-university').checked;
            const activeConts = Array.from(document.querySelectorAll('.chk-cont:checked')).map(cb => cb.value);

            let availableCountries = new Set();
            allNodes.forEach(n => {
                let typeOk = (n.type === 'registry' && allowReg) || (n.type === 'university' && allowUni);
                let contOk = activeConts.includes(n.continent);
                if (typeOk && contOk) availableCountries.add(n.country);
            });

            const selCountry = document.getElementById('sel-country');
            const currentSel = selCountry.value;
            selCountry.innerHTML = '<option value="ALL">-- Všechny dostupné země --</option>';
            Array.from(availableCountries).sort().forEach(c => {
                let opt = document.createElement('option');
                opt.value = c; opt.innerText = c;
                if (c === currentSel) opt.selected = true;
                selCountry.appendChild(opt);
            });

            applyCountryFilter();
        }

        function updatePopup(node) {
            let content = `<b>${node.name}</b><br>
            Země: ${node.country} (${node.continent})<br>
            Typ: <span style="color:${node.type === 'registry' ? '#bd93f9' : '#8be9fd'}">${node.type === 'registry' ? 'NIC Registr' : 'Univerzita'}</span><br>
            <hr style="border:0; border-top:1px dashed #555; margin: 5px 0;">
            <b>Min:</b> ${node.stats.count > 0 ? Math.round(node.stats.min) : '-'} ms<br>
            <b>Max:</b> ${node.stats.count > 0 ? Math.round(node.stats.max) : '-'} ms<br>
            <b>Průměr:</b> ${node.stats.count > 0 ? Math.round(node.stats.avg) : '-'} ms<br>
            <b>Počet:</b> <span style="color:#50fa7b">${node.stats.count}x</span>`;

            if(markers[node.id]) markers[node.id].bindPopup(content);
            if(node.line) node.line.bindPopup(content);
            
            // Okamžitá aktualizace, pokud je popup zrovna otevřený uživatelem
            if (markers[node.id] && markers[node.id].isPopupOpen()) markers[node.id].setPopupContent(content);
            if (node.line && node.line.isPopupOpen()) node.line.setPopupContent(content);
        }

        function applyCountryFilter() {
            const allowReg = document.getElementById('chk-type-registry').checked;
            const allowUni = document.getElementById('chk-type-university').checked;
            const activeConts = Array.from(document.querySelectorAll('.chk-cont:checked')).map(cb => cb.value);
            const selCountry = document.getElementById('sel-country').value;

            linesLayer.clearLayers();
            markersLayer.clearLayers();
            markers = {};

            activeNodes = allNodes.filter(n => {
                return ((n.type === 'registry' && allowReg) || (n.type === 'university' && allowUni)) && 
                       activeConts.includes(n.continent) && 
                       (selCountry === "ALL" || n.country === selCountry);
            });

            document.getElementById('active-count').innerText = activeNodes.length;
            log(`Filtry aplikovány. Cílů k měření: ${activeNodes.length}`, "info");

            activeNodes.forEach(node => {
                let color = node.type === 'university' ? '#8be9fd' : '#bd93f9';
                
                // Uzel
                markers[node.id] = L.circleMarker([node.lat, node.lon], {
                    radius: 4, fillColor: color, color: "#000", weight: 1, fillOpacity: 0.8
                }).addTo(markersLayer);
                
                // Trasa mezi odhadem a cílem
                node.line = L.polyline([[estLat, estLon], [node.lat, node.lon]], {
                    color: color, weight: 1, opacity: 0.15
                }).addTo(linesLayer);
                
                updatePopup(node);
            });
        }

        // --- VIZUALIZACE LETÍCÍCH PAKETŮ ---
        function animatePacket(startLat, startLon, endLat, endLon, durationMs) {
            let packet = L.circleMarker([startLat, startLon], {
                radius: 3, fillColor: '#00ffff', color: '#fff', weight: 1, interactive: false, pane: 'tooltipPane'
            }).addTo(map);
            
            let start = performance.now();
            let animLen = Math.min(durationMs, 1200); // Vizuální strop pro velmi pomalé linky
            
            function frame(time) {
                let elapsed = time - start;
                let progress = elapsed / (animLen / 2); // 0 až 2 (Tam a zpět)
                
                if (progress <= 1) {
                    let lat = startLat + (endLat - startLat) * progress;
                    let lon = startLon + (endLon - startLon) * progress;
                    packet.setLatLng([lat, lon]);
                    requestAnimationFrame(frame);
                } else if (progress <= 2) {
                    let p2 = progress - 1;
                    let lat = endLat + (startLat - endLat) * p2;
                    let lon = endLon + (startLon - endLon) * p2;
                    packet.setLatLng([lat, lon]);
                    requestAnimationFrame(frame);
                } else {
                    map.removeLayer(packet);
                }
            }
            requestAnimationFrame(frame);
        }

        async function ping(node) {
            const start = performance.now();
            try {
                await fetch(node.url + "?no-cache=" + Math.random(), { mode: 'no-cors', cache: 'no-store' });
                let time = performance.now() - start;
                
                // Aktualizace statistik v reálném čase
                node.stats.count++;
                node.stats.sum += time;
                if(time < node.stats.min) node.stats.min = time;
                if(time > node.stats.max) node.stats.max = time;
                node.stats.avg = node.stats.sum / node.stats.count;
                
                updatePopup(node);
                animatePacket(estLat, estLon, node.lat, node.lon, time);
                
                return time;
            } catch (e) { return 9999; }
        }

        async function scanNetwork() {
            if (activeNodes.length === 0) return;
            document.getElementById('status').innerText = `Odesílám pakety na ${activeNodes.length} cílů...`;
            
            let promises = activeNodes.map(async (node) => {
                let time = await ping(node);
                return { ...node, time: time };
            });

            let results = await Promise.all(promises);
            results = results.filter(r => r.time < 9999).sort((a, b) => a.time - b.time);

            document.getElementById('status').innerText = `Odpovědělo ${results.length} uzlů. Reset za 15s.`;

            let topHtml = "";
            results.forEach((r, index) => {
                let color = "#ff5555"; let cssClass = "ping-red";
                if (r.time < 60) { color = "#50fa7b"; cssClass = "ping-green"; }
                else if (r.time < 150) { color = "#f1fa8c"; cssClass = "ping-yellow"; } 

                if(markers[r.id]) markers[r.id].setStyle({ fillColor: color, radius: index < 5 ? 8 : 4, fillOpacity: 0.9 });
                if (index < 5) topHtml += `<div class="stat-row"><span>${r.name.substring(0, 15)}</span><span class="${cssClass}">${Math.round(r.time)} ms</span></div>`;
            });
            document.getElementById('top-nodes').innerHTML = topHtml;

            // PŘEPOČET POLOHY A POSUN PAVUČINY
            let limit = Math.min(results.length, 5);
            if (limit > 0) {
                let sumWeights = 0, sumLat = 0, sumLon = 0;
                for (let i = 0; i < limit; i++) {
                    let weight = 1 / Math.pow(results[i].time, 2); 
                    sumWeights += weight;
                    sumLat += results[i].lat * weight;
                    sumLon += results[i].lon * weight;
                }

                estLat = sumLat / sumWeights;
                estLon = sumLon / sumWeights;

                let errorKm = Math.sqrt(Math.pow((estLat - realLat)*111, 2) + Math.pow((estLon - realLon)*71, 2));
                document.getElementById('loc-coords').innerHTML = `LAT: <span style="color:#8be9fd">${estLat.toFixed(4)}</span><br>LON: <span style="color:#8be9fd">${estLon.toFixed(4)}</span><br><br><span style="color:#aaa; font-size:11px;">Odchylka: ~${Math.round(errorKm)} km</span>`;

                if (!myLocationMarker) {
                    const icon = L.divIcon({ className: '', html: "<div style='background:#0078FF; width:16px; height:16px; border-radius:50%; border:2px solid #fff; box-shadow: 0 0 15px #0078FF;'></div>", iconSize: [20, 20] });
                    myLocationMarker = L.marker([estLat, estLon], {icon: icon}).bindTooltip("Odhad polohy").addTo(map);
                } else {
                    myLocationMarker.setLatLng([estLat, estLon]);
                }

                // Přesunutí startovního bodu všech čar k novému odhadu
                activeNodes.forEach(node => {
                    if(node.line) node.line.setLatLngs([[estLat, estLon], [node.lat, node.lon]]);
                });
            }
        }

        setDefaultFilters();
        setTimeout(scanNetwork, 1000);
        setInterval(scanNetwork, 15000); 
    </script>
