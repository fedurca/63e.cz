<!DOCTYPE html>
<html lang="cs">
<head>
<meta charset="UTF-8">
<title>P2P Gossip Chat v2.2</title>
<style>
body { font-family: sans-serif; margin:0; }
#chat { height: 80vh; overflow:auto; padding:10px; background:#eee; }
#input { display:flex; }
input { flex:1; padding:10px; }
button { padding:10px; }
</style>
</head>
<body>

<div id="chat"></div>
<div id="input">
<input id="msg" placeholder="Zpráva...">
<button onclick="sendMsg()">Send</button>
</div>

<script>
const WORKER = "https://webrtc-dns-signal.63ecz.workers.dev";
const peers = {};
const channels = {};
const seen = new Set();
let myId = Math.random().toString(36).substr(2,6);
let keyPair;

function log(t){ chat.innerHTML += t+"<br>"; chat.scrollTop=chat.scrollHeight; }

// ---------- CRYPTO (FORWARD SECRECY) ----------
async function initCrypto(){
    keyPair = await crypto.subtle.generateKey(
        {name:"ECDH",namedCurve:"P-256"},true,["deriveKey"]
    );
}

async function encryptFS(text, pubJwk){
    const eph = await crypto.subtle.generateKey(
        {name:"ECDH",namedCurve:"P-256"},true,["deriveKey"]
    );

    const pub = await crypto.subtle.importKey("jwk", pubJwk,{name:"ECDH",namedCurve:"P-256"},true,[]);
    const aes = await crypto.subtle.deriveKey(
        {name:"ECDH", public:pub}, eph.privateKey,
        {name:"AES-GCM", length:256}, false, ["encrypt"]
    );

    const iv = crypto.getRandomValues(new Uint8Array(12));
    const enc = await crypto.subtle.encrypt({name:"AES-GCM", iv}, aes, new TextEncoder().encode(text));

    return {
        eph: await crypto.subtle.exportKey("jwk", eph.publicKey),
        iv: btoa(String.fromCharCode(...iv)),
        c: btoa(String.fromCharCode(...new Uint8Array(enc)))
    };
}

async function decryptFS(data){
    const pub = await crypto.subtle.importKey("jwk", data.eph,{name:"ECDH",namedCurve:"P-256"},true,[]);
    const aes = await crypto.subtle.deriveKey(
        {name:"ECDH", public:pub}, keyPair.privateKey,
        {name:"AES-GCM", length:256}, false, ["decrypt"]
    );

    const iv = Uint8Array.from(atob(data.iv), c=>c.charCodeAt(0));
    const buf = Uint8Array.from(atob(data.c), c=>c.charCodeAt(0));

    const dec = await crypto.subtle.decrypt({name:"AES-GCM", iv}, aes, buf);
    return new TextDecoder().decode(dec);
}

// ---------- GOSSIP ----------
function gossip(msg, src=null){
    if(seen.has(msg.id)) return;
    seen.add(msg.id);

    msg.ttl--;
    if(msg.ttl<=0) return;

    Object.entries(channels).forEach(([id,ch])=>{
        if(ch!==src && ch.readyState==="open"){
            safeSend(ch, JSON.stringify(msg), id);
        }
    });

    handle(msg);
}

// ---------- SAFE SEND ----------
const queues = {};

function safeSend(ch,data,id){
    if(!queues[id]) queues[id]=[];
    queues[id].push(data);
    flush(ch,id);
}

function flush(ch,id){
    const q=queues[id];
    if(!q) return;

    while(q.length && ch.bufferedAmount<65536){
        ch.send(q.shift());
    }

    if(q.length) setTimeout(()=>flush(ch,id),50);
}

// ---------- SIGNALING ----------
async function write(key,val){
    await fetch(WORKER,{
        method:"POST",
        body:JSON.stringify({subdomain:key,content:btoa(JSON.stringify(val))})
    });
}

async function read(key){
    const r=await fetch(WORKER+"?key="+key);
    const j=await r.json();
    if(j.content) return JSON.parse(atob(j.content));
}

// ---------- WEBRTC ----------
async function connect(target){
    if(peers[target]) return;

    const pc=new RTCPeerConnection();
    peers[target]=pc;

    const ch=pc.createDataChannel("d");
    bind(ch,target);

    const offer=await pc.createOffer();
    await pc.setLocalDescription(offer);

    setTimeout(async()=>{
        await write("offer-"+target,{from:myId,offer});
    },1000);

    setInterval(async()=>{
        const ans=await read("answer-"+myId);
        if(ans){
            await pc.setRemoteDescription(ans.answer);
        }
    },2000);
}

function bind(ch,id){
    channels[id]=ch;

    ch.onmessage=e=>{
        const msg=JSON.parse(e.data);
        gossip(msg,ch);
    };

    ch.onopen=()=>{
        log("connected "+id);
    };
}

// ---------- MESSAGE ----------
async function sendMsg(){
    const text=msg.value;
    msg.value="";

    const payloads={};

    for(const id in peers){
        const pub = await crypto.subtle.exportKey("jwk", keyPair.publicKey);
        payloads[id]=await encryptFS(text,pub);
    }

    gossip({
        id:Date.now()+Math.random(),
        type:"chat",
        payloads,
        sender:myId,
        ttl:6
    });
}

async function handle(msg){
    if(msg.type==="chat"){
        if(msg.payloads[myId]){
            const t=await decryptFS(msg.payloads[myId]);
            log("<b>"+msg.sender+":</b> "+t);
        }
    }
}

// ---------- DISCOVERY ----------
setInterval(()=>{
    gossip({
        id:Math.random(),
        type:"peer",
        peers:Object.keys(peers),
        ttl:4
    });
},5000);

// ---------- START ----------
(async()=>{
    await initCrypto();
    log("ID: "+myId);

    // bootstrap přes DNS
    setInterval(async()=>{
        const offer=await read("offer-"+myId);
        if(offer){
            const pc=new RTCPeerConnection();
            peers[offer.from]=pc;

            pc.ondatachannel=e=>bind(e.channel,offer.from);

            await pc.setRemoteDescription(offer.offer);
            const ans=await pc.createAnswer();
            await pc.setLocalDescription(ans);

            await write("answer-"+offer.from,{answer:ans});
        }
    },2000);

})();
</script>
</body>
</html>
