<!DOCTYPE html>
<html lang="cs">
<head>
    <meta charset="UTF-8">
    <title>P2P Debug Chat</title>
    <script src="https://cdn.jsdelivr.net/npm/webtorrent@latest/webtorrent.min.js"></script>
    <style>
        body { font-family: sans-serif; background: #e5ddd5; display: flex; flex-direction: column; height: 100vh; margin: 0; }
        header { background: #075e54; color: white; padding: 10px 20px; display: flex; justify-content: space-between; align-items: center; }
        #chat { flex: 1; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; gap: 10px; }
        .msg { background: white; padding: 8px 12px; border-radius: 8px; max-width: 80%; box-shadow: 0 1px 1px rgba(0,0,0,0.1); }
        .msg.me { background: #dcf8c6; align-self: flex-end; }
        
        /* Debug okno */
        #debug { background: #333; color: #0f0; font-family: monospace; font-size: 11px; height: 150px; overflow-y: auto; padding: 10px; border-top: 2px solid #555; }
        .debug-err { color: #f44; }
        .debug-ok { color: #0f0; }

        .controls { padding: 15px; background: #f0f0f0; display: flex; gap: 10px; }
        input { flex: 1; padding: 10px; border-radius: 20px; border: 1px solid #ccc; outline: none; }
        button { padding: 10px 20px; border-radius: 20px; border: none; background: #075e54; color: white; cursor: pointer; }
    </style>
</head>
<body>

<header>
    <span id="headerTitle">P2P Chat</span>
    <small id="peerCount">Peers: 0</small>
</header>

<div id="chat"></div>

<div id="debug">
    <div>--- DIAGNOSTIKA SÍTĚ ---</div>
</div>

<div class="controls">
    <input type="text" id="messageInput" placeholder="Napište zprávu...">
    <button onclick="sendMessage()">Odeslat</button>
</div>

<script>
    const debugEl = document.getElementById('debug');
    function log(msg, type = '') {
        const div = document.createElement('div');
        div.className = type === 'err' ? 'debug-err' : 'debug-ok';
        div.innerText = `[${new Date().toLocaleTimeString()}] ${msg}`;
        debugEl.appendChild(div);
        debugEl.scrollTop = debugEl.scrollHeight;
    }

    // Identita
    const myName = "Uživatel_" + Math.floor(Math.random() * 1000);
    document.getElementById('headerTitle').innerText = `Chat: ${myName}`;

    const client = new WebTorrent();
    // Používáme co nejvíce veřejných trackerů pro zvýšení šance na spojení
    const trackers = [
        'wss://tracker.openwebtorrent.com',
        'wss://tracker.btorrent.xyz',
        'wss://tracker.files.fm:7073/announce',
        'wss://tracker.fastcast.nz'
    ];

    const ROOM_ID = 'debug-room-123456789'; // InfoHash
    const blob = new Blob(['p2p_debug'], { type: 'text/plain' });

    log("Inicializace WebTorrent klienta...");

    client.seed(blob, { name: 'ChatSession', announce: trackers }, (torrent) => {
        log(`Seeding spuštěn. InfoHash: ${torrent.infoHash.substring(0,10)}...`);

        // Sledování trackerů
        torrent.on('warning', err => log("Varování: " + err.message, 'err'));
        torrent.on('error', err => log("CHYBA: " + err.message, 'err'));

        trackers.forEach(tr => {
            log(`Pokus o kontaktování trackeru: ${tr}`);
        });

        torrent.on('trackerAnnounce', () => {
            log("Tracker potvrdil naši přítomnost v síti.");
        });

        // Sledování nových spojení
        torrent.on('wire', (wire) => {
            log(`NALEZEN PEER: ${wire.remoteAddress || 'Neznámá IP'} přes ${wire.type}`);
            document.getElementById('peerCount').innerText = `Peers: ${torrent.numPeers}`;

            wire.use((w) => {
                wire.on('extended', (code, data) => {
                    try {
                        const m = JSON.parse(data.toString());
                        appendMessage(m.sender, m.text, false);
                    } catch(e) {}
                });
            });
        });
    });

    function sendMessage() {
        const input = document.getElementById('messageInput');
        const text = input.value.trim();
        if(!text) return;

        const torrent = client.torrents[0];
        if (torrent && torrent.numPeers > 0) {
            const payload = JSON.stringify({ sender: myName, text: text });
            torrent.wires.forEach(w => w.extended(0, payload));
            appendMessage(myName, text, true);
            input.value = '';
        } else {
            log("Zpráva nebyla odeslána - žádní peeri v dosahu.", "err");
        }
    }

    function appendMessage(sender, text, isMe) {
        const div = document.createElement('div');
        div.className = `msg ${isMe ? 'me' : ''}`;
        div.innerHTML = `<strong>${sender}:</strong><br>${text}`;
        document.getElementById('chat').appendChild(div);
    }
</script>
</body>
</html>
