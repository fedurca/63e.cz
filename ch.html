<!DOCTYPE html>
<html lang="cs">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>E2E Tree P2P Chat v1.4.3</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pako/2.1.0/pako.min.js"></script>
    <style>
        :root { --primary: #0078FF; --bg-color: #f4f7f6; --chat-bg: #ffffff; }
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; }
        body, html { height: 100%; background-color: var(--bg-color); overflow: hidden; }
        #app { display: flex; flex-direction: column; height: 100vh; max-width: 1200px; margin: 0 auto; background: var(--chat-bg); box-shadow: 0 0 20px rgba(0,0,0,0.1); position: relative; }

        header { background: var(--primary); color: white; padding: 15px; display: flex; justify-content: space-between; align-items: center; z-index: 10; }
        .status-dot { display: inline-block; width: 10px; height: 10px; background: #ff4757; border-radius: 50%; margin-right: 5px; }
        .status-dot.online { background: #2ed573; }
        .status-dot.host { background: #feca57; box-shadow: 0 0 8px #feca57; }
        .secure-badge { background: #2ed573; color: #000; font-size: 0.7rem; padding: 3px 6px; border-radius: 10px; font-weight: bold; margin-left: 10px; }
        .version-badge { font-size: 0.75rem; opacity: 0.8; margin-left: 10px; }
        
        .main-content { display: flex; flex: 1; overflow: hidden; flex-direction: column; }
        @media (min-width: 800px) { .main-content { flex-direction: row; } }

        /* CHAT */
        #chat-container { flex: 1; display: flex; flex-direction: column; position: relative; border-right: 1px solid #ddd; }
        #chat-area { flex: 1; padding: 15px; overflow-y: auto; background: #e5ddd5; display: flex; flex-direction: column; gap: 10px; }
        .msg { max-width: 80%; min-width: 150px; padding: 8px 12px; border-radius: 12px; font-size: 0.95rem; line-height: 1.4; word-wrap: break-word; }
        .msg-self { align-self: flex-end; background: #dcf8c6; border-bottom-right-radius: 2px; }
        .msg-other { align-self: flex-start; background: #fff; border-bottom-left-radius: 2px; }
        .msg-system { align-self: center; background: rgba(0,0,0,0.1); color: #555; font-size: 0.8rem; border-radius: 10px; padding: 5px 10px; }
        
        #input-area { display: flex; padding: 10px; background: #f0f0f0; border-top: 1px solid #ddd; }
        #input-area input { flex: 1; padding: 12px; border: none; border-radius: 20px; font-size: 1rem; margin-right: 10px; }
        #input-area button { background: var(--primary); color: white; border: none; border-radius: 20px; padding: 0 20px; font-weight: bold; cursor: pointer; }
        #input-area button:disabled { opacity: 0.5; cursor: not-allowed; }

        /* DEBUG PANELS */
        #debug-panel { display: flex; flex-direction: column; background: #1e1e1e; color: #00ff00; font-family: monospace; width: 100%; height: 50vh; border-left: 1px solid #333; }
        @media (min-width: 800px) { #debug-panel { width: 450px; height: 100%; } }
        
        .debug-header { background: #333; padding: 8px 10px; font-size: 0.8rem; color: #fff; border-bottom: 1px solid #444; font-weight: bold; }
        .debug-stats { display: grid; grid-template-columns: 1fr 1fr; gap: 5px; font-size: 0.75rem; color: #aaa; padding: 5px 10px; background: #111; border-bottom: 1px solid #444; }
        .debug-stats span { color: #00ff00; font-weight: bold; }
        
        #topo-container { height: 180px; background: #0a0a0a; display: flex; justify-content: center; align-items: center; position: relative; border-bottom: 1px solid #444; flex-shrink: 0; }
        #topo-canvas { width: 100%; height: 100%; }
        .topo-label { position: absolute; top: 5px; left: 5px; color: #888; font-size: 0.7rem; pointer-events: none; }

        #net-health-panel { height: 150px; overflow-y: auto; background: #151515; border-bottom: 1px solid #444; flex-shrink: 0; }
        #net-health-list table { width: 100%; border-collapse: collapse; text-align: left; font-size: 0.75rem; color: #ccc; }
        #net-health-list th { background: #222; padding: 4px 10px; position: sticky; top: 0; color: #fff; }
        #net-health-list td { padding: 4px 10px; border-bottom: 1px solid #333; }

        #debug-log { flex: 1; padding: 10px; overflow-y: auto; font-size: 0.75rem; line-height: 1.4; white-space: pre-wrap; word-wrap: break-word; }
        .log-info { color: #aaa; } .log-success { color: #2ed573; } .log-error { color: #ff4757; } .log-webrtc { color: #feca57; } .log-e2e { color: #e056fd; } .log-dns { color: #00d2d3; }

        /* SETUP SCREEN */
        #setup-screen { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: var(--bg-color); z-index: 20; display: flex; align-items: center; justify-content: center; padding: 20px; }
        .setup-box { background: white; padding: 30px; border-radius: 15px; box-shadow: 0 4px 15px rgba(0,0,0,0.05); width: 100%; max-width: 400px; text-align: center; }
        .setup-box input { width: 100%; padding: 12px; border: 1px solid #ddd; border-radius: 8px; margin-bottom: 20px; font-size: 1.1rem; text-align: center;}
        .setup-box button { width: 100%; padding: 15px; border: none; border-radius: 8px; font-size: 1.1rem; font-weight: bold; background: var(--primary); color: white; cursor: pointer; }
    </style>
</head>
<body>

<div id="app">
    <header>
        <div>
            <span id="status-dot" class="status-dot"></span>
            <h1 style="display:inline;">Tree P2P</h1>
            <span class="secure-badge">🔒 E2E</span>
            <span class="version-badge">v1.4.3 (Robustní NAT)</span>
        </div>
        <div style="font-size: 0.9rem;">Role: <span id="ui-role">Zjišťuji...</span> | 👥: <span id="ui-user-count">1</span></div>
    </header>

    <div class="main-content">
        <div id="chat-container">
            <div id="chat-area"></div>
            <div id="input-area">
                <input type="text" id="chat-input" placeholder="Zpráva..." disabled onkeypress="if(event.key === 'Enter') sendMsg()">
                <button id="send-btn" disabled onclick="sendMsg()">Odeslat</button>
            </div>
        </div>

        <div id="debug-panel">
            <div id="topo-container">
                <div class="topo-label">STROMOVÁ TOPOLOGIE (HUB & SPOKE)</div>
                <canvas id="topo-canvas"></canvas>
            </div>
            
            <div class="debug-stats">
                <div>ID: <span id="dbg-id"></span></div>
                <div>Stav DNS: <span id="dbg-dns">IDLE</span></div>
                <div>Přímé linky: <span id="dbg-peers">0</span></div>
                <div>Uzlů v síti: <span id="dbg-nodes">1</span></div>
            </div>

            <div class="debug-header">📡 ZDRAVÍ SÍTĚ (CONTINUOUS TEST)</div>
            <div id="net-health-panel">
                <div id="net-health-list"></div>
            </div>

            <div class="debug-header">📜 SYSTÉMOVÝ LOG</div>
            <div id="debug-log"></div>
        </div>
    </div>

    <div id="setup-screen">
        <div class="setup-box">
            <h2>Vstup do sítě</h2>
            <p style="color: #666; margin: 10px 0 20px; font-size: 0.9rem;">V1.4.3: Ochrana proti zbrklému převzetí sítě a NAT podpora.</p>
            <input type="text" id="username" placeholder="Tvá přezdívka">
            <button id="join-btn" onclick="initSystem()">Generovat klíče a připojit</button>
        </div>
    </div>
</div>

<script>
    // --- KONFIGURACE (Ověř URL) ---
    const WORKER_URL = "https://webrtc-dns-signal.63ecz.workers.dev";
    const MAX_HISTORY = 250;
    
    // Extrémně posílená WebRTC konfigurace pro mobilní sítě
    const WEBRTC_CONFIG = {
        iceServers: [
            { urls: 'stun:stun.l.google.com:19302' },
            { urls: 'stun:stun1.l.google.com:19302' },
            { urls: 'stun:stun2.l.google.com:19302' },
            { urls: 'stun:stun3.l.google.com:19302' },
            { urls: 'stun:stun4.l.google.com:19302' },
            { urls: 'turn:openrelay.metered.ca:80', username: 'openrelayproject', credential: 'openrelayproject' },
            { urls: 'turn:openrelay.metered.ca:443', username: 'openrelayproject', credential: 'openrelayproject' }
        ]
    };
    
    let myId = Math.random().toString(36).substr(2, 6);
    let myName = "";
    let isDnsHost = false;
    let connections = {}; 
    let channels = {}; 
    let networkGraph = { root: myId, edges: [] }; 
    
    let seenMessages = new Set(); 
    let knownNodes = {}; 
    let chatHistory = []; 
    let myKeyPair = null; 

    document.getElementById('dbg-id').innerText = myId;

    function buf2b64(buf) { return btoa(String.fromCharCode.apply(null, new Uint8Array(buf))); }
    function b642buf(b64) {
        const bin = atob(b64); const ui8 = new Uint8Array(bin.length);
        for (let i=0; i<bin.length; i++) ui8[i] = bin.charCodeAt(i);
        return ui8.buffer;
    }

    function logDebug(msg, type = 'info') {
        const logWindow = document.getElementById('debug-log');
        const time = new Date().toLocaleTimeString('cs-CZ', { hour12: false, hour: '2-digit', minute:'2-digit', second:'2-digit' });
        logWindow.innerHTML += `<div><span style="color:#555">[${time}]</span> <span class="log-${type}">${msg}</span></div>`;
        logWindow.scrollTop = logWindow.scrollHeight;
    }
    
    function updateDebugStats(stat, value) { document.getElementById(`dbg-${stat}`).innerText = value; }
    
    function unlockChat() {
        document.getElementById('setup-screen').style.display = 'none';
        document.getElementById('chat-input').disabled = false;
        document.getElementById('send-btn').disabled = false;
        document.getElementById('status-dot').className = `status-dot ${isDnsHost ? 'host' : 'online'}`;
        document.getElementById('ui-role').innerText = isDnsHost ? 'Master (Hub)' : 'Node (Spoke)';
    }

    async function initCrypto() {
        logDebug("Generuji ECDH (P-256) asymetrický pár klíčů...", "e2e");
        myKeyPair = await crypto.subtle.generateKey({ name: "ECDH", namedCurve: "P-256" }, true, ["deriveKey"]);
        const myJwk = await crypto.subtle.exportKey("jwk", myKeyPair.publicKey);
        knownNodes[myId] = { name: myName, publicKeyJWK: myJwk, lastSeen: Date.now() }; 
        return myJwk;
    }

    async function deriveAesKey(peerId, peerJwk) {
        if(knownNodes[peerId] && knownNodes[peerId].derivedAesKey) return knownNodes[peerId].derivedAesKey;
        const importedPubKey = await crypto.subtle.importKey("jwk", peerJwk, { name: "ECDH", namedCurve: "P-256" }, true, []);
        const aesKey = await crypto.subtle.deriveKey(
            { name: "ECDH", public: importedPubKey }, myKeyPair.privateKey,
            { name: "AES-GCM", length: 256 }, true, ["encrypt", "decrypt"]
        );
        knownNodes[peerId] = { ...knownNodes[peerId], derivedAesKey: aesKey };
        return aesKey;
    }

    async function encryptE2E(plaintext, targetId) {
        const aesKey = await deriveAesKey(targetId, knownNodes[targetId].publicKeyJWK);
        const iv = crypto.getRandomValues(new Uint8Array(12));
        const cipherBuf = await crypto.subtle.encrypt({ name: "AES-GCM", iv: iv }, aesKey, new TextEncoder().encode(plaintext));
        return { iv: buf2b64(iv), cipher: buf2b64(cipherBuf) };
    }

    async function decryptE2E(ivB64, cipherB64, senderId) {
        try {
            const aesKey = await deriveAesKey(senderId, knownNodes[senderId].publicKeyJWK);
            const plainBuf = await crypto.subtle.decrypt({ name: "AES-GCM", iv: b642buf(ivB64) }, aesKey, b642buf(cipherB64));
            return new TextDecoder().decode(plainBuf);
        } catch(e) { return null; }
    }

    function komprimovat(data) { return btoa(String.fromCharCode.apply(null, pako.deflate(JSON.stringify(data)))); }
    function dekomprimovat(b64) {
        const str = atob(b64); const pole = new Uint8Array(str.length);
        for(let i=0; i<str.length; i++) pole[i] = str.charCodeAt(i);
        return JSON.parse(pako.inflate(pole, { to: 'string' }));
    }

    async function writeDns(subdomena, data) {
        updateDebugStats('dns', `ZÁPIS: ${subdomena}`);
        logDebug(`[DNS OUT] Odesílám zápis pro: ${subdomena}.63e.cz`, 'dns');
        try {
            const res = await fetch(WORKER_URL, { method: "POST", headers: { "Content-Type": "application/json" }, body: JSON.stringify({ subdomain: subdomena, content: komprimovat(data) }) });
            const out = await res.json();
            if(out.success) { updateDebugStats('dns', 'OK'); return true; } 
            else return false;
        } catch (e) { return false; }
    }

    async function readDns(subdomena) {
        updateDebugStats('dns', `ČTENÍ: ${subdomena}`);
        try {
            const cacheBuster = Date.now() + Math.floor(Math.random() * 1000);
            const res = await fetch(`https://cloudflare-dns.com/dns-query?name=${subdomena}.63e.cz&type=TXT&_cb=${cacheBuster}`, { 
                headers: { 'Accept': 'application/dns-json', 'Cache-Control': 'no-cache' }, cache: 'no-store' 
            });
            const json = await res.json();
            if(!json.Answer) return null;
            
            updateDebugStats('dns', 'OK');
            const rawData = json.Answer[0].data;
            const cleanB64 = rawData.replace(/["\s\n\r]/g, ''); 
            const data = dekomprimovat(cleanB64);
            if(subdomena === 'queue' && data.guestId && data.guestId !== 'IDLE') logDebug(`[DNS IN] Fronta obsahuje: ${data.guestId}`, 'dns');
            return data;
        } catch(e) { return null; }
    }

    function loadHistory() {
        const saved = localStorage.getItem('chat_history');
        if(saved) {
            chatHistory = JSON.parse(saved);
            chatHistory.forEach(msg => renderMessage(msg.author, msg.text, msg.author === myName ? 'self' : 'other', msg.time || Date.now(), false));
        }
    }

    function saveMessage(msgObj) {
        if(chatHistory.find(m => m.id === msgObj.id)) return false; 
        chatHistory.push(msgObj);
        if(chatHistory.length > MAX_HISTORY) chatHistory.shift();
        localStorage.setItem('chat_history', JSON.stringify(chatHistory));
        return true;
    }

    function renderMessage(author, text, type, timestamp = Date.now(), scroll = true) {
        const chat = document.getElementById('chat-area');
        const div = document.createElement('div');
        div.className = `msg msg-${type}`;
        
        const timeStr = new Date(timestamp).toLocaleTimeString('cs-CZ', { hour: '2-digit', minute:'2-digit', second: type === 'system' ? '2-digit' : undefined });
        if (type !== 'system') {
            div.innerHTML = `<div style="font-size:0.75rem; color:#777; margin-bottom:3px; display:flex; justify-content:space-between;">
                <b>${author}</b> <span style="font-weight:normal; font-size:0.65rem; color:#aaa; margin-left:10px;">${timeStr}</span></div>${text}`;
        } else div.innerHTML = `<span style="color:#aaa; font-size:0.75rem;">[${timeStr}]</span> ${text}`;
        
        chat.appendChild(div);
        if(scroll) chat.scrollTop = chat.scrollHeight;
    }

    function routeMessage(msgObj, sourceChannel = null) {
        if (seenMessages.has(msgObj.id)) return; 
        seenMessages.add(msgObj.id);
        if (seenMessages.size > 1000) seenMessages.delete(seenMessages.values().next().value);

        msgObj.ttl -= 1; 
        if (msgObj.ttl <= 0) return; 

        Object.values(channels).forEach(ch => {
            if (ch.readyState === 'open' && ch !== sourceChannel) ch.send(JSON.stringify(msgObj));
        });

        processPayload(msgObj);
    }

    async function processPayload(msg) {
        if (msg.sender && knownNodes[msg.sender]) knownNodes[msg.sender].lastSeen = Date.now();

        if (msg.type === 'announce') {
            if (!knownNodes[msg.sender]) {
                knownNodes[msg.sender] = { name: msg.name, publicKeyJWK: msg.jwk, lastSeen: Date.now() };
                updateDebugStats('nodes', Object.keys(knownNodes).length);
                document.getElementById('ui-user-count').innerText = Object.keys(knownNodes).length;
                renderMessage('System', `${msg.name} se připojil(a) do sítě.`, 'system');
                
                const myJwk = await crypto.subtle.exportKey("jwk", myKeyPair.publicKey);
                routeMessage({ id: Date.now() + myId, ttl: 10, type: 'announce', sender: myId, name: myName, jwk: myJwk });

                if (isDnsHost && chatHistory.length > 0) {
                    const historyJson = JSON.stringify(chatHistory);
                    encryptE2E(historyJson, msg.sender).then(encryptedHistory => {
                        routeMessage({ id: Date.now() + myId + "sync", ttl: 2, type: 'sync-history', sender: myId, target: msg.sender, payload: encryptedHistory });
                    });
                }
            }
        } 
        else if (msg.type === 'sync-history' && msg.target === myId) {
            const plaintextHistory = await decryptE2E(msg.payload.iv, msg.payload.cipher, msg.sender);
            if (plaintextHistory) {
                const historyArray = JSON.parse(plaintextHistory);
                logDebug(`Historie dešifrována!`, "success");
                historyArray.forEach(histMsg => { 
                    if(saveMessage(histMsg)) renderMessage(histMsg.author, histMsg.text, histMsg.author === myName ? 'self' : 'other', histMsg.time);
                });
            }
        } 
        else if (msg.type === 'chat') {
            if (msg.payloads[myId]) {
                const plainJson = await decryptE2E(msg.payloads[myId].iv, msg.payloads[myId].cipher, msg.sender);
                if (plainJson) {
                    const secretData = JSON.parse(plainJson);
                    const authorName = knownNodes[msg.sender] ? knownNodes[msg.sender].name : 'Neznámý';
                    const msgObjForStorage = { id: msg.id, author: authorName, text: secretData.text, time: secretData.time };
                    if(saveMessage(msgObjForStorage)) renderMessage(authorName, secretData.text, 'other', secretData.time);
                }
            }
        } 
        else if (msg.type === 'topo-sync') {
            networkGraph = msg.graph;
            drawTopology();
        }
    }

    async function sendMsg() {
        const text = document.getElementById('chat-input').value.trim();
        if (!text) return;
        
        const timeNow = Date.now();
        let encryptedPayloads = {};
        for (const peerId of Object.keys(knownNodes)) {
            if (peerId !== myId) {
                const secretPayload = JSON.stringify({ text: text, time: timeNow });
                encryptedPayloads[peerId] = await encryptE2E(secretPayload, peerId);
            }
        }

        const msgId = Date.now() + myId;
        const msgObj = { id: msgId, ttl: 10, type: 'chat', sender: myId, payloads: encryptedPayloads };

        saveMessage({ id: msgId, author: myName, text: text, time: timeNow });
        renderMessage('Ty', text, 'self', timeNow);
        routeMessage(msgObj); 
        document.getElementById('chat-input').value = '';
    }

    // --- WEBRTC ---
    async function createP2PNode(targetId, isInitiator, useDns = false) {
        if (connections[targetId]) return; 
        logDebug(`Zakládám linku pro: ${targetId}`, 'webrtc');
        
        const pc = new RTCPeerConnection(WEBRTC_CONFIG);
        connections[targetId] = pc;

        pc.oniceconnectionstatechange = () => {
            if (pc.iceConnectionState === 'disconnected' || pc.iceConnectionState === 'failed') {
                logDebug(`[P2P] Spojení s ${targetId} selhalo nebo padlo.`, 'error');
                delete connections[targetId]; delete channels[targetId];
                if(knownNodes[targetId]) delete knownNodes[targetId].ping;
                updateDebugStats('peers', Object.keys(channels).length);
                checkIsolation(); 
            }
        };

        if (isInitiator) {
            const ch = pc.createDataChannel('chat');
            bindDataChannel(ch, targetId);
            await pc.setLocalDescription(await pc.createOffer());
            
            const onGatheringComplete = async () => {
                if (pc.gatheringDone) return;
                pc.gatheringDone = true;
                if (useDns) {
                    logDebug(`Iniciuji zápis SDP klíčů do DNS...`, 'info');
                    const ok = await writeDns(`offer-${myId}`, pc.localDescription);
                    if (ok) {
                        await writeDns('queue', { guestId: myId });
                    } else {
                        logDebug(`Zápis Offeru selhal. Fronta nebyla zapsána.`, 'error');
                    }
                }
            };
            if (pc.iceGatheringState === 'complete') onGatheringComplete();
            else {
                pc.onicegatheringstatechange = () => { if (pc.iceGatheringState === 'complete') onGatheringComplete(); };
                setTimeout(onGatheringComplete, 4000); 
            }
        } else {
            pc.ondatachannel = (e) => bindDataChannel(e.channel, targetId);
        }
    }

    function bindDataChannel(channel, targetId) {
        channel.onopen = async () => {
            channels[targetId] = channel;
            updateDebugStats('peers', Object.keys(channels).length);
            unlockChat();
            logDebug(`P2P Spojeno s ${targetId} 🚀`, 'success');
            
            const myJwk = await crypto.subtle.exportKey("jwk", myKeyPair.publicKey);
            routeMessage({ id: Date.now() + myId, ttl: 10, type: 'announce', sender: myId, name: myName, jwk: myJwk });

            setInterval(() => {
                if(channel.readyState === 'open') channel.send(JSON.stringify({ type: '_ping', sender: myId, t: Date.now() }));
            }, 3000);
        };

        channel.onmessage = (e) => {
            const msgObj = JSON.parse(e.data);
            if (msgObj.type === '_ping') {
                channel.send(JSON.stringify({ type: '_pong', sender: myId, t: msgObj.t }));
                if (knownNodes[targetId]) knownNodes[targetId].lastSeen = Date.now();
                return;
            }
            if (msgObj.type === '_pong') {
                if (knownNodes[targetId]) {
                    knownNodes[targetId].ping = Date.now() - msgObj.t;
                    knownNodes[targetId].lastSeen = Date.now();
                }
                return;
            }
            routeMessage(msgObj, channel); 
        };
    }

    setInterval(() => {
        const list = document.getElementById('net-health-list');
        if(!list) return;
        let html = '<table><tr><th>Uzel</th><th>Role</th><th>Ping</th><th>Status</th></tr>';
        
        const now = Date.now();
        const activeIds = Object.keys(knownNodes).sort();

        activeIds.forEach(id => {
            const node = knownNodes[id];
            const isMe = id === myId;
            const isMaster = (networkGraph.root === id);
            const role = isMaster ? 'Master (Hub)' : 'Spoke';
            const pingStr = isMe ? '<span style="color:#aaa">Local</span>' : (node.ping !== undefined ? `${node.ping} ms` : '<span style="color:#aaa">Nepřímý</span>');
            
            const lastSeenDiff = now - (node.lastSeen || now);
            let status = '<span style="color:#2ed573">Aktivní</span>';
            if (!isMe && lastSeenDiff > 20000) status = '<span style="color:#ff4757">Odpojen</span>';
            else if (!isMe && lastSeenDiff > 7000) status = '<span style="color:#feca57">Zpoždění</span>';

            html += `<tr><td>${node.name.substr(0,10)} ${isMe ? '(Ty)' : ''}</td><td>${role}</td><td>${pingStr}</td><td>${status}</td></tr>`;
        });
        html += '</table>';
        list.innerHTML = html;
    }, 1000);

    // --- RECOVERY V1.4.3: OCHRANA PROTI ZBRKLÉ REVOLUCI ---
    async function checkIsolation() {
        if (Object.keys(channels).length === 0) {
            logDebug("Spojení selhalo. Zjišťuji důvod...", "error");
            document.getElementById('ui-role').innerText = 'Izolován';
            
            // KROK 1: Místo okamžité revoluce zkontrolujeme, jestli Hub náhodou nežije
            const hostAlive = await readDns('host-alive');
            if (hostAlive && (Date.now() - hostAlive.timestamp < 120000)) {
                logDebug("Hub v DNS stále žije! Chyba byla v mém NAT/WebRTC spojení. Zkusím se připojit znovu...", "info");
                setTimeout(() => joinViaDns(), 5000);
                return; // Přerušíme proces uzurpace
            }

            // KROK 2: Pokud DNS mlčí, Hub je fakt mrtvý. Jdeme do voleb.
            const now = Date.now();
            let aliveIds = Object.keys(knownNodes).filter(id => (now - knownNodes[id].lastSeen) < 20000);
            if (!aliveIds.includes(myId)) aliveIds.push(myId);
            aliveIds.sort();

            if (aliveIds[0] === myId) {
                logDebug(`👑 Hub je mrtev, mám nejvyšší prioritu. Přebírám DNS Mastera!`, "webrtc");
                startDnsHostLoop();
            } else {
                const jitter = Math.floor(Math.random() * 3000) + 3000; 
                logDebug(`Hub je mrtev. Novým by měl být [${aliveIds[0]}]. Vyčkávám ${jitter}ms a pokusím se připojit...`, "info");
                setTimeout(() => joinViaDns(), jitter);
            }
        }
    }

    // --- BOOTSTRAP ---
    async function initSystem() {
        document.getElementById('join-btn').disabled = true;
        document.getElementById('ui-role').innerText = "Kontroluji...";
        myName = document.getElementById('username').value.trim() || 'Anonym_' + myId;
        
        document.getElementById('setup-screen').style.display = 'none'; 
        loadHistory();
        await initCrypto();
        
        const hostAlive = await readDns('host-alive');
        if (hostAlive && (Date.now() - hostAlive.timestamp < 120000)) joinViaDns();
        else startDnsHostLoop();
    }

    let dnsInterval;
    async function startDnsHostLoop() {
        isDnsHost = true;
        networkGraph.root = myId; 
        unlockChat();
        
        await writeDns('host-alive', { timestamp: Date.now() });
        setInterval(() => writeDns('host-alive', { timestamp: Date.now() }), 60000);

        if (dnsInterval) clearInterval(dnsInterval);
        
        let pollingGuests = new Set();
        dnsInterval = setInterval(async () => {
            const queue = await readDns('queue');
            if (queue && queue.guestId && queue.guestId !== 'IDLE' && queue.guestId !== myId && !pollingGuests.has(queue.guestId)) {
                
                const offer = await readDns(`offer-${queue.guestId}`);
                if(offer) {
                    logDebug(`[DNS] Zpracovávám nováčka: ${queue.guestId}`, 'success');
                    pollingGuests.add(queue.guestId);
                    await createP2PNode(queue.guestId, false);
                    await connections[queue.guestId].setRemoteDescription(offer);
                    await connections[queue.guestId].setLocalDescription(await connections[queue.guestId].createAnswer());
                    
                    const sendDnsAnswer = async () => {
                        if (connections[queue.guestId].answerDone) return;
                        connections[queue.guestId].answerDone = true;
                        logDebug(`[DNS OUT] Odesílám Answer pro: ${queue.guestId}`, 'info');
                        await writeDns(`answer-${queue.guestId}`, connections[queue.guestId].localDescription);
                        await writeDns('queue', { guestId: 'IDLE' }); 
                    };

                    if (connections[queue.guestId].iceGatheringState === 'complete') sendDnsAnswer();
                    else {
                        connections[queue.guestId].onicegatheringstatechange = () => { if (connections[queue.guestId].iceGatheringState === 'complete') sendDnsAnswer(); };
                        setTimeout(sendDnsAnswer, 4000);
                    }
                }
            }
        }, 5000);
    }

    async function joinViaDns() {
        document.getElementById('ui-role').innerText = "Spojuji se...";
        await createP2PNode('hub', true, true); 
        
        let pokusy = 0;
        const iv = setInterval(async () => {
            pokusy++;
            if (pokusy > 9) { 
                clearInterval(iv);
                logDebug("Spojení vypršelo (Timeout).", "error");
                delete connections['hub'];
                checkIsolation(); 
                return;
            }
            logDebug(`[DNS] Hledám Answer (Pokus ${pokusy}/9)...`, 'info');
            const answer = await readDns(`answer-${myId}`);
            if (answer) {
                clearInterval(iv);
                logDebug(`[DNS] Answer nalezen, aplikuji do WebRTC...`, 'success');
                await connections['hub'].setRemoteDescription(answer);
            }
        }, 5000);
    }

    setInterval(() => {
        if (isDnsHost) {
            networkGraph = { root: myId, edges: Object.keys(channels) };
            routeMessage({ id: Date.now() + myId, ttl: 10, type: 'topo-sync', sender: myId, graph: networkGraph });
            drawTopology();
        }
    }, 2000);

    function drawTopology() {
        const canvas = document.getElementById('topo-canvas');
        if(!canvas) return;
        canvas.width = canvas.parentElement.clientWidth;
        canvas.height = canvas.parentElement.clientHeight;
        const ctx = canvas.getContext('2d');
        ctx.clearRect(0, 0, canvas.width, canvas.height);
        
        const rootId = networkGraph.root || myId;
        const edges = networkGraph.edges || [];
        
        let nodesArr = [rootId, ...edges];
        if (!nodesArr.includes(myId)) nodesArr.push(myId); 
        nodesArr = [...new Set(nodesArr)]; 
        
        const radius = Math.min(canvas.width, canvas.height) / 3;
        const cx = canvas.width / 2;
        const cy = canvas.height / 2;
        const pos = {};
        
        nodesArr.forEach((n, i) => {
            if (n === rootId) { pos[n] = { x: cx, y: cy }; } 
            else {
                const spokeIndex = nodesArr.indexOf(n) - (nodesArr.indexOf(rootId) < nodesArr.indexOf(n) ? 1 : 0);
                const spokeCount = Math.max(1, nodesArr.length - 1);
                const angle = (spokeIndex / spokeCount) * 2 * Math.PI - Math.PI / 2;
                pos[n] = { x: cx + radius * Math.cos(angle), y: cy + radius * Math.sin(angle) };
            }
        });

        ctx.lineWidth = 2;
        if (pos[rootId]) {
            edges.forEach(target => {
                if (pos[target]) {
                    ctx.beginPath(); ctx.moveTo(pos[rootId].x, pos[rootId].y); ctx.lineTo(pos[target].x, pos[target].y);
                    ctx.strokeStyle = '#555'; ctx.stroke();
                }
            });
        }

        nodesArr.forEach(n => {
            ctx.beginPath(); ctx.arc(pos[n].x, pos[n].y, 18, 0, 2 * Math.PI);
            ctx.fillStyle = (n === myId) ? '#0078FF' : (n === rootId ? '#feca57' : '#333');
            ctx.fill(); ctx.strokeStyle = '#fff'; ctx.lineWidth = 1; ctx.stroke();
            
            ctx.fillStyle = '#fff'; ctx.font = '10px Arial'; ctx.textAlign = 'center';
            const shortName = knownNodes[n] ? knownNodes[n].name.substr(0,4) : n.substr(0,4);
            ctx.fillText(shortName, pos[n].x, pos[n].y + 4);
        });
    }
