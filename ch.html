<!DOCTYPE html>
<html lang="cs">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no" />
  <title>P2P Chat v2.2 - Static Hash & Mobile UI</title>
  <style>
    :root{
      --bg:#1a1a1a; --panel:#222; --panel2:#111; --border:#444; --text:#ccc;
      --me:#054740; --other:#333; --accent:#075e54; --accent2:#128c7e;
      --warn:#ffaa00; --ok:#55ff55; --err:#ff5555; --info:#55aaff;
    }
    *{ box-sizing:border-box; }
    
    /* Zásadní úprava pro mobily: 100dvh a zabránění scrollování celé stránky */
    html, body {
      font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, monospace;
      background:var(--bg); color:var(--text);
      display:flex; flex-direction:column; 
      height: 100dvh; /* Dynamic viewport - nezasahuje pod klávesnici/adresní řádek */
      margin: 0; padding: 0;
      overflow: hidden; 
    }
    
    header{
      background:var(--accent); color:#fff; padding:10px 12px;
      display:flex; justify-content:space-between; align-items:center; flex-wrap:wrap;
      font-family: system-ui, -apple-system, Segoe UI, Roboto, sans-serif; gap:12px;
      flex-shrink: 0;
    }
    header .left{ display:flex; flex-direction:column; gap:6px; flex: 1; min-width: 250px; }
    header .topline{ display:flex; align-items:center; gap:8px; flex-wrap:wrap; }
    .version{ font-size:.75em; background:var(--accent2); padding:3px 8px; border-radius:999px; }
    .meta{ opacity:.9; font-size:.85em; display:flex; gap:8px; flex-wrap:wrap; align-items:center; }
    .pill{ background:rgba(255,255,255,.12); padding:2px 8px; border-radius:999px; }
    .mono{ font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, monospace; }
    .truncate{
      max-width:30ch; overflow:hidden; text-overflow:ellipsis; white-space:nowrap;
      display:inline-block; vertical-align:bottom;
    }

    #chat{
      flex:1; overflow-y:auto; padding:12px;
      display:flex; flex-direction:column; gap:8px; background:#202020;
    }
    .msg{
      background:var(--other); padding:8px 12px; border-radius:12px;
      max-width:85%; border:1px solid #3a3a3a; align-self:flex-start;
      box-shadow:0 1px 0 rgba(0,0,0,.3);
      word-break:break-word;
    }
    .msg.me{ background:var(--me); align-self:flex-end; border-color:var(--accent); }
    .msg small{ color:#b6b6b6; display:flex; gap:8px; align-items:center; flex-wrap:wrap; }
    .msg .ts{ opacity:.75; font-size:.8em; }

    #debug{
      background:#000; color:#0f0; font-size:11px; 
      height:120px; /* Menší pevná výška pro mobily */
      flex-shrink: 0; /* Nesmí se zmáčknout */
      overflow-y:auto; padding:8px; border-top:2px solid var(--border); line-height:1.4;
    }
    .debug-err{ color:var(--err); }
    .debug-ok{ color:var(--ok); }
    .debug-warn{ color:var(--warn); }
    .debug-info{ color:var(--info); }

    .controls{
      padding:10px; background:var(--panel);
      display:flex; gap:8px; border-top:1px solid var(--border); align-items:center;
      flex-shrink: 0; flex-wrap: nowrap; /* Tlačítko vždy vedle inputu */
    }
    input{
      flex:1; min-width:0; /* Zásadní pro mobily: dovolí zmenšení inputu */
      padding:12px; font-size:16px; /* Zabrání auto-zoomu na iOS */
      border-radius:8px; border:1px solid var(--border);
      background:var(--panel2); color:#fff; outline:none;
    }
    button{
      padding:12px 14px; border-radius:8px; border:none;
      background:var(--accent); color:#fff; cursor:pointer; font-weight:700;
      white-space: nowrap; font-size:14px;
    }
    button:hover{ filter:brightness(1.05); }
    .btn-warn{ background:#d35400; }
    .btn-ghost{ background:transparent; border:1px solid rgba(255,255,255,.25); }

    @media (min-width: 768px){
      #debug{ height: 180px; }
      .truncate{ max-width:52ch; }
    }
  </style>
</head>
<body>

<header>
  <div class="left">
    <div class="topline">
      <strong id="headerName">…</strong>
      <span class="version">v2.2</span>
      <span class="pill mono" id="headerId">ID: …</span>
    </div>
    <div class="meta">
      <span class="pill" id="peerCount">Peers: 0</span>
      <span class="pill" id="netState">Network: …</span>
      <span class="pill mono truncate" id="roomHint" title="Magnet URI místnosti">room: …</span>
    </div>
  </div>
  <div class="meta" style="flex:1; justify-content: flex-end;">
    <button class="btn-ghost" id="copyRoomBtn" title="Kopie">Kopírovat room</button>
    <button class="btn-ghost" id="testTrackersBtn" title="Test WS">Test Trackers</button>
    <button class="btn-warn" id="reconnectBtn">↻ Restart</button>
  </div>
</header>

<div id="chat"></div>

<div id="debug">
  <div>=== P2P DIAGNOSTIKA v2.2 (Static Hash & Mobile Layout) ===</div>
</div>

<div class="controls">
  <input type="text" id="messageInput" placeholder="Zadejte zprávu…" autocomplete="off" />
  <button id="sendBtn">Odeslat</button>
</div>

<script>
(function () {
  const debugEl = document.getElementById('debug');
  function log(msg, type='') {
    const div = document.createElement('div');
    if (type) div.className = 'debug-' + type;
    div.textContent = `[${new Date().toLocaleTimeString()}] ${msg}`;
    debugEl.appendChild(div);
    debugEl.scrollTop = debugEl.scrollHeight;
  }

  const sources = [
    "./webtorrent.min.js",
    "https://cdn.jsdelivr.net/npm/webtorrent@latest/webtorrent.min.js",
    "https://unpkg.com/webtorrent@latest/webtorrent.min.js",
    "https://cdnjs.cloudflare.com/ajax/libs/webtorrent/2.5.16/webtorrent.min.js"
  ];

  function inject(src) {
    return new Promise((resolve, reject) => {
      const s = document.createElement('script');
      s.src = src; s.async = true;
      s.onload = () => resolve(src);
      s.onerror = () => reject(new Error('load failed: ' + src));
      document.head.appendChild(s);
    });
  }

  async function loadAny() {
    for (const src of sources) {
      try {
        await inject(src);
        if (window.WebTorrent) return;
      } catch (e) { /* ignore and try next */ }
    }
    throw new Error('WebTorrent se nepodařilo načíst.');
  }

  loadAny().then(() => startApp(log)).catch(err => log(err.message, 'err'));

  function startApp(log) {
    'use strict';

    const APP_VERSION = '2.2';
    const ROOM_ID = 'p2p-sync-room-omega-2026';

    const TRACKERS_BASE = [
      "wss://tracker.webtorrent.dev:443",
      "wss://tracker.btorrent.xyz:443",
      "wss://tracker.files.fm:7073/announce",
      "wss://tracker.openwebtorrent.com",
      "wss://tracker.fastcast.nz"
    ];
    const TRACKERS_WS_OPTIONAL = ["ws://tracker.files.fm:7072/announce"];
    const TRACKERS = (location.protocol === 'https:' ? TRACKERS_BASE : TRACKERS_BASE.concat(TRACKERS_WS_OPTIONAL)).filter(Boolean);

    const MAX_HISTORY = 500, MAX_RENDER = 250, MAX_SYNC_SEND = 300, SYNC_CHUNK = 40, MAX_PACKET_BYTES = 64 * 1024;

    const chatEl = document.getElementById('chat');
    const inputEl = document.getElementById('messageInput');
    const peerCountEl = document.getElementById('peerCount');
    const netStateEl = document.getElementById('netState');
    const headerNameEl = document.getElementById('headerName');
    const headerIdEl = document.getElementById('headerId');
    const roomHintEl = document.getElementById('roomHint');

    function setNetState() { netStateEl.textContent = `Net: ${navigator.onLine ? 'online' : 'offline'}`; }
    window.addEventListener('online', setNetState); window.addEventListener('offline', setNetState); setNetState();

    const LS = { deviceId: 'p2p_device_id', name: 'p2p_name', seq: `p2p_seq_${ROOM_ID}`, history: `p2p_history_${ROOM_ID}`, outbox: `p2p_outbox_${ROOM_ID}` };
    function randId(len=16) {
      const abc = 'abcdefghijklmnopqrstuvwxyz0123456789'; let s = '';
      for(let i=0;i<len;i++) s += abc[Math.floor(Math.random()*abc.length)]; return s;
    }

    let deviceId = localStorage.getItem(LS.deviceId);
    if (!deviceId) { deviceId = `dev_${randId(20)}`; localStorage.setItem(LS.deviceId, deviceId); }

    let myName = localStorage.getItem(LS.name);
    if (!myName) { myName = `User_${Math.floor(Math.random()*9999)}`; localStorage.setItem(LS.name, myName); }
    headerNameEl.textContent = myName;

    let seq = parseInt(localStorage.getItem(LS.seq) || '0', 10);
    function nextSeq() { seq += 1; localStorage.setItem(LS.seq, String(seq)); return seq; }

    let chatHistory = [], msgIndex = new Set(), outbox = [];
    function loadJson(k, d) { try{ const r=localStorage.getItem(k); return r?JSON.parse(r):d; }catch{return d;} }
    function saveJson(k, v) { try{ localStorage.setItem(k, JSON.stringify(v)); }catch{} }

    function loadHistory() {
      chatHistory = (loadJson(LS.history, []) || []).filter(m => m && m.id).slice(-MAX_HISTORY);
      msgIndex = new Set(chatHistory.map(m => m.id));
    }
    function loadOutbox() { outbox = (loadJson(LS.outbox, []) || []).filter(m => m && m.id).slice(-200); }
    loadHistory(); loadOutbox();

    function persistHistory() {
      chatHistory.sort((a,b) => (a.time-b.time) || String(a.senderId).localeCompare(String(b.senderId)) || ((a.seq||0)-(b.seq||0)));
      if (chatHistory.length > MAX_HISTORY) chatHistory = chatHistory.slice(-MAX_HISTORY);
      saveJson(LS.history, chatHistory);
    }
    function persistOutbox() { saveJson(LS.outbox, outbox.slice(-200)); }
    function addMessage(m) {
      if (!m || !m.id || msgIndex.has(m.id)) return false;
      msgIndex.add(m.id); chatHistory.push(m); return true;
    }
    function lastTime() { let t=0; for(const m of chatHistory) if(m.time>t) t=m.time; return t; }
    function tailIds(n=20) { return chatHistory.slice(-n).map(m=>m.id); }

    function isNearBottom() { return chatEl.scrollHeight - chatEl.scrollTop - chatEl.clientHeight < 80; }
    function formatTime(ts) { try { return new Date(ts).toLocaleTimeString([], {hour:'2-digit', minute:'2-digit'}); } catch { return ''; } }
    
    function render() {
      const nearBottom = isNearBottom();
      chatEl.innerHTML = '';
      for (const m of chatHistory.slice(-MAX_RENDER)) {
        const div = document.createElement('div');
        div.className = `msg ${m.senderId === deviceId ? 'me' : ''}`;
        
        const small = document.createElement('small');
        small.innerHTML = `<span>${m.sender || '???'}</span> · <span class="ts">${formatTime(m.time)}</span>`;
        
        const text = document.createElement('div');
        text.textContent = String(m.text || '');
        
        div.appendChild(small); div.appendChild(text); chatEl.appendChild(div);
      }
      if (nearBottom) chatEl.scrollTop = chatEl.scrollHeight;
    }
    persistHistory(); render();

    // Buffer helpers pro bezpečné kódování textu
    function toBin(str) { return window.Buffer ? window.Buffer.from(str) : new TextEncoder().encode(str); }
    function fromBin(buf) {
      try { return (typeof buf==='string') ? buf : (window.Buffer && window.Buffer.isBuffer(buf) ? buf.toString('utf8') : new TextDecoder().decode(buf)); }
      catch { return ''; }
    }

    // STATICKÝ POKLAD MÍSTNOSTI: 
    // Používáme pevný text a statické datum k vytvoření 100% nezměnitelného hashe
    const roomPayloadText = `p2pchat-room:${ROOM_ID}\nversion:STATIC\n`;
    const roomBuffer = toBin(roomPayloadText); 

    const client = new window.WebTorrent({ tracker: { rtcConfig: { iceServers: [ { urls: 'stun:stun.l.google.com:19302' }, { urls: 'stun:stun.cloudflare.com:3478' } ] } } });
    client.on('error', err => log(`Client err: ${err}`, 'err'));

    client.on('ready', () => {
      headerIdEl.textContent = `ID: ${client.peerId.substring(0,8)}`;
      log(`Klient OK.`, 'info');
    });

    function P2PChatExtension(onPacket) {
      return function (wire) {
        return {
          name: 'p2pchat',
          onMessage: function (buf) {
            if (!buf || buf.length > MAX_PACKET_BYTES) return;
            onPacket(wire, fromBin(buf));
          }
        };
      };
    }

    const peerState = new Map();
    function sendPacket(wire, obj) { try { wire.extended('p2pchat', toBin(JSON.stringify(obj))); return true; } catch { return false; } }
    function broadcast(torrent, obj) { const p = toBin(JSON.stringify(obj)); for (const w of torrent.wires) try { w.extended('p2pchat', p); } catch {} }

    function sendHello(wire) { sendPacket(wire, { type:'hello', v: APP_VERSION, deviceId, name: myName, lastTime: lastTime(), tail: tailIds(), count: chatHistory.length }); }
    function sendMsgsSince(wire, since) {
      const msgs = chatHistory.filter(m => m.time > since).slice(-MAX_SYNC_SEND);
      let off = 0, p = 0;
      while (off < msgs.length) {
        const chunk = msgs.slice(off, off + SYNC_CHUNK);
        off += SYNC_CHUNK; p++;
        sendPacket(wire, { type:'msgs', part: p, more: off < msgs.length, data: chunk });
      }
    }

    function onPacket(torrent, wire, text) {
      let obj; try { obj = JSON.parse(text); } catch { return; }
      if (!obj || !obj.type) return;

      if (obj.type === 'hello') {
        const remote = peerState.get(wire.remotePeerId) || {};
        const now = Date.now(), theirLast = obj.lastTime || 0, ourLast = lastTime();
        if (remote.lastSyncAt && (now - remote.lastSyncAt) < 1500) return;

        if (ourLast > theirLast) { remote.lastSyncAt = now; peerState.set(wire.remotePeerId, remote); sendMsgsSince(wire, theirLast); }
        else if (ourLast < theirLast) { remote.lastSyncAt = now; peerState.set(wire.remotePeerId, remote); sendPacket(wire, { type:'getSince', since: ourLast }); }
        else peerState.set(wire.remotePeerId, remote);
      }
      else if (obj.type === 'getSince') sendMsgsSince(wire, obj.since || 0);
      else if (obj.type === 'msgs' && Array.isArray(obj.data)) {
        let a=0; for(const m of obj.data) if(addMessage(m)) a++;
        if(a>0) { persistHistory(); render(); log(`Sync: +${a} zpráv.`, 'ok'); }
      }
      else if (obj.type === 'chat') { if(addMessage(obj)){ persistHistory(); render(); } }
    }

    let torrentRef = null;
    function updatePeers() { peerCountEl.textContent = `Peers: ${torrentRef ? torrentRef.numPeers : 0}`; }

    function attachTorrentHandlers(torrent) {
      torrentRef = torrent; updatePeers();
      roomHintEl.textContent = `room: ${torrent.magnetURI}`;
      log(`Hash OK: ${torrent.infoHash.substring(0,12)}...`, 'ok');

      torrent.on('wire', (wire) => {
        updatePeers(); log(`+ PEER: ${wire.remotePeerId?.substring(0,8)}`, 'ok');
        wire.use(P2PChatExtension((w, txt) => onPacket(torrent, w, txt)));
        setTimeout(() => { try{ sendHello(wire); flushOutbox(); }catch{} }, 200);
        wire.on('close', () => { updatePeers(); log(`- PEER ODPOJEN`, 'warn'); });
      });
    }

    function startOrRestartTorrent(reason) {
      log(`Start roje: ${reason}`, 'info');
      if (torrentRef) { client.remove(torrentRef.infoHash, () => { torrentRef = null; doSeed(); }); } 
      else doSeed();
    }

    function doSeed() {
      // KLÍČOVÁ ZMĚNA: Přidán fixní čas "creationDate". Bez tohoto parametru WebTorrent přidá 
      // do hashe při každém načtení stránky aktuální čas a hash se změní!
      const opts = {
        name: `p2pchat_${ROOM_ID}.txt`,
        announce: TRACKERS,
        creationDate: new Date('2024-01-01T00:00:00Z') 
      };
      client.seed(roomBuffer, opts, attachTorrentHandlers);
    }

    function flushOutbox() {
      if (!torrentRef || torrentRef.numPeers === 0 || !outbox.length) return;
      let sent = 0; for (const m of outbox) { broadcast(torrentRef, m); sent++; }
      outbox = []; persistOutbox();
    }

    startOrRestartTorrent('initial');

    function sendChatMessage() {
      const text = (inputEl.value || '').trim(); if (!text) return;
      const msg = { id: `${deviceId}_${Date.now().toString(36)}_${randId(6)}`, type: 'chat', senderId: deviceId, sender: myName, text, time: Date.now(), seq: nextSeq() };
      addMessage(msg); persistHistory(); render(); inputEl.value = '';

      if (torrentRef && torrentRef.numPeers > 0) {
        try { broadcast(torrentRef, msg); } catch { outbox.push(msg); persistOutbox(); }
      } else { outbox.push(msg); persistOutbox(); }
    }

    document.getElementById('sendBtn').addEventListener('click', sendChatMessage);
    inputEl.addEventListener('keydown', (e) => { if (e.key === 'Enter') sendChatMessage(); });
    document.getElementById('reconnectBtn').addEventListener('click', () => startOrRestartTorrent('manual'));
    
    document.getElementById('copyRoomBtn').addEventListener('click', async () => {
      const mag = torrentRef ? torrentRef.magnetURI : ''; if(!mag) return;
      try { await navigator.clipboard.writeText(mag); log('Magnet zkopírován.', 'ok'); } 
      catch { log('Kopírování selhalo.', 'err'); }
    });

    document.getElementById('testTrackersBtn').addEventListener('click', async () => {
      log('Test trackerů...', 'info');
      for (const url of TRACKERS) {
        await new Promise(r => {
          let ws; try { ws = new WebSocket(url); } catch { log(`FAIL: ${url}`, 'err'); return r(); }
          const timer = setTimeout(() => { try{ws.close();}catch{} log(`TIMEOUT: ${url}`, 'warn'); r(); }, 3000);
          ws.onopen = () => { clearTimeout(timer); log(`OK: ${url}`, 'ok'); ws.close(); r(); };
          ws.onerror = () => { clearTimeout(timer); log(`FAIL: ${url}`, 'err'); ws.close(); r(); };
        });
      }
    });

    setInterval(() => { updatePeers(); setNetState(); }, 2000);
  }
})();
</script>

</body>
</html>
