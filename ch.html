<!DOCTYPE html>
<html lang="cs">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>P2P Torrent Chat</title>
    <script src="https://cdn.jsdelivr.net/npm/webtorrent@latest/webtorrent.min.js"></script>
    <style>
        body { 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; 
            background: #e5ddd5; 
            display: flex; 
            flex-direction: column; 
            height: 100vh; 
            margin: 0; 
        }
        header {
            background: #075e54;
            color: white;
            padding: 15px 20px;
            font-size: 1.2em;
            box-shadow: 0 2px 5px rgba(0,0,0,0.2);
        }
        #chat { 
            flex: 1; 
            overflow-y: auto; 
            padding: 20px; 
            display: flex;
            flex-direction: column;
            gap: 10px;
        }
        .msg { 
            background: white; 
            padding: 8px 12px; 
            border-radius: 8px; 
            max-width: 80%;
            align-self: flex-start;
            box-shadow: 0 1px 1px rgba(0,0,0,0.1);
            position: relative;
        }
        .msg.me {
            background: #dcf8c6;
            align-self: flex-end;
        }
        .sender {
            font-size: 0.75em;
            font-weight: bold;
            color: #27ae60;
            display: block;
            margin-bottom: 2px;
        }
        .status { 
            background: rgba(255, 255, 255, 0.7);
            color: #555; 
            font-size: 0.85em; 
            text-align: center; 
            margin: 5px auto; 
            padding: 5px 15px;
            border-radius: 20px;
        }
        .controls { 
            padding: 15px; 
            background: #f0f0f0; 
            display: flex; 
            gap: 10px; 
        }
        input { 
            flex: 1; 
            padding: 12px; 
            border: none; 
            border-radius: 25px; 
            outline: none;
        }
        button { 
            padding: 10px 20px; 
            background: #075e54; 
            color: white; 
            border: none; 
            border-radius: 25px; 
            cursor: pointer; 
            font-weight: bold;
        }
        button:hover { background: #128c7e; }
    </style>
</head>
<body>

<header id="headerTitle">P2P Torrent Chat</header>

<div id="chat">
    <div class="status" id="status">Probíhá start P2P sítě...</div>
</div>

<div class="controls">
    <input type="text" id="messageInput" placeholder="Napište zprávu..." autocomplete="off">
    <button onclick="sendMessage()">Odeslat</button>
</div>

<script>
    // --- KONFIGURACE IDENTITY ---
    const animals = ['Lev', 'Tygr', 'Vlk', 'Orel', 'Panda', 'Liška', 'Medvěd', 'Sokol', 'Delfín', 'Žralok'];
    const adjectives = ['Rychlý', 'Moudrý', 'Tichý', 'Divoký', 'Bystrý', 'Silný', 'Zlatý', 'Věrný'];

    function getIdentity() {
        let name = localStorage.getItem('p2p_chat_name');
        if (!name) {
            name = adjectives[Math.floor(Math.random() * adjectives.length)] + 
                   ' ' + animals[Math.floor(Math.random() * animals.length)];
            localStorage.setItem('p2p_chat_name', name);
        }
        return name;
    }

    const myName = getIdentity();
    document.getElementById('headerTitle').innerText = `P2P Chat: ${myName}`;

    // --- P2P LOGIKA ---
    const client = new WebTorrent();
    const chatElement = document.getElementById('chat');
    const statusElement = document.getElementById('status');
    const inputElement = document.getElementById('messageInput');

    // Unikátní ID místnosti (InfoHash). Kdokoli má toto ID, je v chatu s vámi.
    const ROOM_ID = 'p2p-chat-universal-id-2024'; 
    
    const torrentOptions = {
        name: 'P2P_Chat_Session',
        announce: [
            'wss://tracker.openwebtorrent.com',
            'wss://tracker.btorrent.xyz',
            'wss://tracker.files.fm:7073/announce'
        ]
    };

    // "Zasazení" torrentu pro propojení s ostatními
    const dummyBlob = new Blob(['p2p_active'], { type: 'text/plain' });
    client.seed(dummyBlob, torrentOptions, (torrent) => {
        statusElement.innerText = `Připojen k síti. Čekám na peery...`;

        torrent.on('wire', (wire) => {
            console.log('Nový peer!');
            updatePeerCount(torrent.numPeers);

            wire.use((w) => {
                wire.on('extended', (code, data) => {
                    if (code !== 0) {
                        try {
                            const msgObj = JSON.parse(data.toString());
                            appendMessage(msgObj.sender, msgObj.text, false);
                        } catch (e) { console.error("Chyba dat", e); }
                    }
                });
            });
        });

        torrent.on('noPeers', () => updatePeerCount(0));
    });

    function updatePeerCount(count) {
        statusElement.innerText = count > 0 
            ? `Online uživatelé: ${count + 1}` 
            : `Jste v chatu sami. Otevřete soubor v jiném okně.`;
    }

    function sendMessage() {
        const text = inputElement.value.trim();
        if (!text) return;

        const torrent = client.torrents[0];
        if (torrent && torrent.wires.length > 0) {
            const payload = JSON.stringify({
                sender: myName,
                text: text
            });

            torrent.wires.forEach(wire => {
                wire.extended(0, payload);
            });
            
            appendMessage(myName, text, true);
            inputElement.value = '';
        } else {
            alert('Žádné aktivní spojení s ostatními uživateli.');
        }
    }

    function appendMessage(sender, text, isMe) {
        const div = document.createElement('div');
        div.className = `msg ${isMe ? 'me' : ''}`;
        
        // Jednoduchá ochrana proti HTML injekci
        const cleanText = text.replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;");
        const cleanSender = sender.replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;");

        div.innerHTML = `<span class="sender">${isMe ? 'Já' : cleanSender}</span>${cleanText}`;
        chatElement.appendChild(div);
        chatElement.scrollTop = chatElement.scrollHeight;
    }

    inputElement.addEventListener('keypress', (e) => {
        if (e.key === 'Enter') sendMessage();
    });
</script>

</body>
</html>
