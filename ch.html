<!DOCTYPE html>
<html lang="cs">
<head>
    <meta charset="UTF-8">
    <title>P2P Chat v1.5 - Robust Sync</title>
    <script src="https://cdn.jsdelivr.net/npm/webtorrent@latest/webtorrent.min.js"></script>
    <style>
        body { font-family: 'Consolas', monospace; background: #1a1a1a; color: #ccc; display: flex; flex-direction: column; height: 100vh; margin: 0; }
        header { background: #075e54; color: white; padding: 10px 20px; display: flex; justify-content: space-between; align-items: center; font-family: sans-serif; }
        .version { font-size: 0.7em; background: #128c7e; padding: 3px 8px; border-radius: 12px; margin-left: 10px; vertical-align: middle; }
        #chat { flex: 1; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; gap: 8px; background: #222; }
        .msg { background: #333; padding: 8px 12px; border-radius: 8px; max-width: 80%; border: 1px solid #444; align-self: flex-start; }
        .msg.me { background: #054740; align-self: flex-end; border-color: #075e54; }
        #debug { background: #000; color: #0f0; font-size: 11px; height: 280px; overflow-y: auto; padding: 10px; border-top: 2px solid #444; line-height: 1.4; }
        .debug-err { color: #ff5555; }
        .debug-ok { color: #55ff55; }
        .debug-warn { color: #ffaa00; }
        .debug-info { color: #55aaff; }
        .controls { padding: 15px; background: #222; display: flex; gap: 10px; border-top: 1px solid #444; }
        input { flex: 1; padding: 10px; border-radius: 5px; border: 1px solid #444; background: #111; color: white; outline: none; }
        button { padding: 10px 15px; border-radius: 5px; border: none; background: #075e54; color: white; cursor: pointer; font-weight: bold; }
        .btn-sync { background: #d35400; }
    </style>
</head>
<body>

<header>
    <div>
        <strong id="headerName">...</strong> 
        <span class="version">v1.5</span>
        <small id="headerId" style="opacity: 0.6; margin-left: 10px;"></small>
    </div>
    <div id="peerCount">Peers: 0</div>
</header>

<div id="chat"></div>

<div id="debug">
    <div>=== P2P DIAGNOSTIKA v1.5 ===</div>
</div>

<div class="controls">
    <button class="btn-sync" onclick="forceAnnounce()" title="Vynutí znovupřipojení k trackerům">&#x21bb; Znovu připojit</button>
    <input type="text" id="messageInput" placeholder="Zadejte zprávu..." autocomplete="off">
    <button onclick="sendChatMessage()">Odeslat</button>
</div>

<script>
    // --- 1. NASTAVENÍ HYBRIDNÍCH TRACKERŮ ---
    const ROOM_ID = 'p2p-sync-room-omega-2026'; 
    
    // Mix trackerů. Prohlížeč použije WSS, Desktop (v budoucnu) využije HTTPS/UDP
    const TRACKER_LIST = [
        'wss://tracker.openwebtorrent.com',
        'wss://tracker.webtorrent.dev',
        'wss://tracker.btorrent.xyz',
        'wss://tracker.files.fm:7073/announce',
        'https://tracker.nanoha.org:443/announce',
        'udp://tracker.opentrackr.org:1337/announce'
    ];

    let myName = localStorage.getItem('p2p_name');
    if (!myName) {
        myName = "Uživatel_" + Math.floor(Math.random() * 9999);
        localStorage.setItem('p2p_name', myName);
    }
    document.getElementById('headerName').innerText = myName;

    // --- 2. HISTORIE CHATU ---
    let chatHistory = JSON.parse(localStorage.getItem(`p2p_history_${ROOM_ID}`) || '[]');

    function saveAndRenderHistory() {
        chatHistory.sort((a, b) => a.time - b.time);
        if (chatHistory.length > 100) chatHistory = chatHistory.slice(-100);
        localStorage.setItem(`p2p_history_${ROOM_ID}`, JSON.stringify(chatHistory));
        
        const chatEl = document.getElementById('chat');
        chatEl.innerHTML = ''; 
        chatHistory.forEach(m => {
            const div = document.createElement('div');
            div.className = `msg ${m.sender === myName ? 'me' : ''}`;
            div.innerHTML = `<small style="color: #888">${m.sender}</small><br>${m.text.replace(/</g, "&lt;")}`;
            chatEl.appendChild(div);
        });
        chatEl.scrollTop = chatEl.scrollHeight;
    }
    saveAndRenderHistory();

    // --- 3. DEBUG LOG ---
    const debugEl = document.getElementById('debug');
    function log(msg, type = '') {
        const div = document.createElement('div');
        div.className = type ? `debug-${type}` : '';
        div.innerText = `[${new Date().toLocaleTimeString()}] ${msg}`;
        debugEl.appendChild(div);
        debugEl.scrollTop = debugEl.scrollHeight;
    }

    // --- 4. WEBTORRENT P2P LOGIKA ---
    const client = new WebTorrent({
        tracker: {
            rtcConfig: {
                iceServers: [
                    { urls: 'stun:stun.l.google.com:19302' },
                    { urls: 'stun:global.stun.twilio.com:3478' }
                ]
            }
        }
    });

    client.on('ready', () => {
        document.getElementById('headerId').innerText = `ID: ${client.peerId.substring(0, 8)}`;
        log(`Klient připraven. Můj Peer ID: ${client.peerId}`, 'info');
    });

    const blob = new Blob(['p2p_sync_v1_5'], { type: 'text/plain' });

    // Záznamník chyb pro eliminační metodu
    let failedTrackers = new Set();

    client.seed(blob, { name: 'ChatSession', announce: TRACKER_LIST }, (torrent) => {
        log(`Připojování k roji. Hash: ${torrent.infoHash.substring(0,10)}...`, 'warn');

        // DETEKCE PŘIPOJENÍ TRACKERŮ (Kombinovaná metoda)
        torrent.on('trackerAnnounce', () => {
            let activeTrackers = [];

            // Metoda 1: Přímá inspekce otevřených WebSocketů
            try {
                if (torrent.discovery && torrent.discovery.tracker && torrent.discovery.tracker.trackers) {
                    torrent.discovery.tracker.trackers.forEach(t => {
                        // Kontrola, zda má objekt trackeru aktivní socket
                        if (t.socket && t.socket.readyState === 1) { // 1 = WebSocket.OPEN
                            activeTrackers.push(t.announceUrl);
                        }
                    });
                }
            } catch (e) {}

            // Metoda 2: Eliminační metoda (pokud selže API inspekce)
            if (activeTrackers.length === 0) {
                activeTrackers = TRACKER_LIST.filter(url => 
                    url.startsWith('wss://') && !failedTrackers.has(url)
                );
            }

            if (activeTrackers.length > 0) {
                // Odstranění duplicit pro jistotu
                activeTrackers = [...new Set(activeTrackers)];
                log(`Tracker OK: Announce úspěšný přes [${activeTrackers.join(', ')}]`, 'ok');
            } else {
                log(`Tracker OK: Announce úspěšný (URL skryto v API prohlížeče).`, 'ok');
            }
        });

        // DETEKCE CHYB A FILTRACE
        torrent.on('warning', err => {
            if (err.message.includes('unsupported tracker protocol')) {
                // Tichá ignorace HTTPS/UDP trackerů v prohlížeči
                return; 
            }
            
            const match = err.message.match(/connecting to (.+)/);
            if (match) {
                const url = match[1].replace(/['"]/g, '').trim();
                failedTrackers.add(url);
                log(`Tracker nedostupný: ${url}`, 'err');
            } else {
                log(`Varování: ${err.message}`, 'warn');
            }
        });

        // DETEKCE PEERŮ A SYNCHRONIZACE
        torrent.on('wire', (wire) => {
            log(`+++ NOVÝ PEER: ID ${wire.remotePeerId.substring(0,8)} přes WebRTC`, 'ok');
            document.getElementById('peerCount').innerText = `Peers: ${torrent.numPeers}`;

            wire.use((w) => {
                // Poslání historie
                try {
                    const syncData = JSON.stringify({ type: 'sync', data: chatHistory });
                    wire.extended(0, syncData);
                } catch(e) {}

                // Příjem zpráv nebo historie
                wire.on('extended', (code, data) => {
                    try {
                        const m = JSON.parse(data.toString());
                        if (m.type === 'chat') {
                            if (!chatHistory.find(msg => msg.id === m.id)) {
                                chatHistory.push(m);
                                saveAndRenderHistory();
                            }
                        } 
                        else if (m.type === 'sync') {
                            let added = 0;
                            m.data.forEach(syncMsg => {
                                if (!chatHistory.find(msg => msg.id === syncMsg.id)) {
                                    chatHistory.push(syncMsg);
                                    added++;
                                }
                            });
                            if (added > 0) {
                                log(`Sync: Staženo ${added} starších zpráv.`, 'info');
                                saveAndRenderHistory();
                            }
                        }
                    } catch(e) {}
                });
            });

            wire.on('close', () => {
                log(`--- PEER ODPOJEN`, 'err');
                document.getElementById('peerCount').innerText = `Peers: ${torrent.numPeers}`;
            });
        });
    });

    // --- 5. ODESÍLÁNÍ ZPRÁV A MANUÁLNÍ PING ---
    function sendChatMessage() {
        const input = document.getElementById('messageInput');
        const text = input.value.trim();
        if(!text) return;

        const newMsg = {
            id: Math.random().toString(36).substring(2) + Date.now().toString(36),
            type: 'chat',
            sender: myName,
            text: text,
            time: Date.now()
        };

        const torrent = client.torrents[0];
        if (torrent && torrent.numPeers > 0) {
            try {
                const payload = JSON.stringify(newMsg);
                torrent.wires.forEach(w => w.extended(0, payload));
                
                chatHistory.push(newMsg);
                saveAndRenderHistory();
                input.value = '';
                log(`Zpráva odeslána (${torrent.numPeers} peerům)`, 'ok');
            } catch (e) {
                log(`Chyba: ${e.message}`, 'err');
            }
        } else {
            log(`Offline. Zpráva uložena do fronty.`, "err");
            chatHistory.push(newMsg);
            saveAndRenderHistory();
            input.value = '';
        }
    }

    function forceAnnounce() {
        log("Manuální dotaz na trackery (v1.5)...", "info");
        failedTrackers.clear(); // Reset fail listu pro nový pokus
        const torrent = client.torrents[0];
        if (torrent && torrent.discovery && torrent.discovery.tracker) {
            torrent.discovery.tracker.announce();
        }
    }

    document.getElementById('messageInput').addEventListener('keypress', function (e) {
        if (e.key === 'Enter') sendChatMessage();
    });
</script>
</body>
</html>
