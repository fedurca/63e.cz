<!DOCTYPE html>
<html lang="cs">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>P2P DNS Chat Pro</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pako/2.1.0/pako.min.js"></script>
    <style>
        :root { --primary: #0078FF; --bg-color: #f4f7f6; --chat-bg: #ffffff; }
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; }
        body, html { height: 100%; background-color: var(--bg-color); overflow: hidden; }
        #app { display: flex; flex-direction: column; height: 100vh; max-width: 900px; margin: 0 auto; background: var(--chat-bg); box-shadow: 0 0 20px rgba(0,0,0,0.1); position: relative; }

        header { background: var(--primary); color: white; padding: 15px; display: flex; justify-content: space-between; align-items: center; z-index: 10; }
        .status-dot { display: inline-block; width: 10px; height: 10px; background: #ff4757; border-radius: 50%; margin-right: 5px; }
        .status-dot.online { background: #2ed573; }
        .status-dot.host { background: #feca57; }
        
        .main-content { display: flex; flex: 1; overflow: hidden; flex-direction: column; }
        @media (min-width: 600px) { .main-content { flex-direction: row; } }

        #chat-container { flex: 1; display: flex; flex-direction: column; position: relative; border-right: 1px solid #ddd; }
        #chat-area { flex: 1; padding: 15px; overflow-y: auto; background: #e5ddd5; display: flex; flex-direction: column; gap: 10px; }
        .msg { max-width: 80%; padding: 10px 15px; border-radius: 15px; font-size: 0.95rem; line-height: 1.4; word-wrap: break-word; }
        .msg-self { align-self: flex-end; background: #dcf8c6; border-bottom-right-radius: 2px; }
        .msg-other { align-self: flex-start; background: #fff; border-bottom-left-radius: 2px; }
        .msg-system { align-self: center; background: rgba(0,0,0,0.1); color: #555; font-size: 0.8rem; border-radius: 10px; padding: 5px 10px; }
        
        #input-area { display: flex; padding: 10px; background: #f0f0f0; border-top: 1px solid #ddd; }
        #input-area input { flex: 1; padding: 12px; border: none; border-radius: 20px; font-size: 1rem; margin-right: 10px; }
        #input-area button { background: var(--primary); color: white; border: none; border-radius: 20px; padding: 0 20px; font-weight: bold; cursor: pointer; }

        #debug-panel { flex: 1; background: #1e1e1e; color: #00ff00; font-family: monospace; display: flex; flex-direction: column; max-height: 40vh; }
        @media (min-width: 600px) { #debug-panel { max-height: 100%; max-width: 350px; } }
        
        .debug-header { background: #333; padding: 10px; font-size: 0.85rem; color: #fff; border-bottom: 1px solid #444; }
        .debug-stats { display: grid; grid-template-columns: 1fr 1fr; gap: 5px; margin-top: 5px; font-size: 0.8rem; color: #aaa; }
        .debug-stats span { color: #00ff00; font-weight: bold; }
        
        #debug-log { flex: 1; padding: 10px; overflow-y: auto; font-size: 0.8rem; line-height: 1.5; white-space: pre-wrap; word-wrap: break-word; }
        .log-info { color: #aaa; } .log-success { color: #2ed573; } .log-error { color: #ff4757; } .log-webrtc { color: #feca57; }

        #setup-screen { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: var(--bg-color); z-index: 20; display: flex; align-items: center; justify-content: center; padding: 20px; }
        .setup-box { background: white; padding: 30px; border-radius: 15px; box-shadow: 0 4px 15px rgba(0,0,0,0.05); width: 100%; max-width: 400px; text-align: center; }
        .setup-box input { width: 100%; padding: 12px; border: 1px solid #ddd; border-radius: 8px; margin-bottom: 20px; font-size: 1.1rem; text-align: center;}
        .setup-box button { width: 100%; padding: 15px; border: none; border-radius: 8px; font-size: 1.1rem; font-weight: bold; background: var(--primary); color: white; cursor: pointer; }
    </style>
</head>
<body>

<div id="app">
    <header>
        <div>
            <span id="status-dot" class="status-dot"></span>
            <h1 style="display:inline;">P2P Chat</h1>
        </div>
        <div style="font-size: 0.9rem;">Role: <span id="ui-role">Zjišťuji...</span> | 👥: <span id="ui-user-count">1</span></div>
    </header>

    <div class="main-content">
        <div id="chat-container">
            <div id="chat-area"></div>
            <div id="input-area">
                <input type="text" id="chat-input" placeholder="Zpráva..." disabled onkeypress="if(event.key === 'Enter') sendMsg()">
                <button id="send-btn" disabled onclick="sendMsg()">Odeslat</button>
            </div>
        </div>

        <div id="debug-panel">
            <div class="debug-header">
                <div>🛠 DIAGNOSTIKA & STAV</div>
                <div class="debug-stats">
                    <div>Místnost: <span id="dbg-room">Společná</span></div>
                    <div>Stav DNS: <span id="dbg-dns">IDLE</span></div>
                    <div>Peers (Linky): <span id="dbg-peers">0</span></div>
                    <div>Zpráv v paměti: <span id="dbg-msg-count">0</span></div>
                </div>
            </div>
            <div id="debug-log"></div>
        </div>
    </div>

    <div id="setup-screen">
        <div class="setup-box">
            <h2>Vstup do chatu</h2>
            <p style="color: #666; margin: 10px 0 20px; font-size: 0.9rem;">Aplikace automaticky zjistí, zda místnost existuje, nebo ji založí.</p>
            <input type="text" id="username" placeholder="Tvá přezdívka">
            <button onclick="autoJoin()">Vstoupit do místnosti</button>
        </div>
    </div>
</div>

<script>
    // --- KONFIGURACE ---
    const WORKER_URL = "https://webrtc-dns-signal.63ecz.workers.dev"; 
    const MAX_HISTORY = 250;
    
    let myName = "";
    let myId = Math.random().toString(36).substr(2, 6); // Unikátní ID klienta
    let isHost = false;
    let peers = []; 
    let activeUsers = new Set(); 
    let chatHistory = [];

    // --- DEBUG & UI ---
    function logDebug(msg, type = 'info') {
        const logWindow = document.getElementById('debug-log');
        const time = new Date().toLocaleTimeString('cs-CZ', { hour12: false, hour: '2-digit', minute:'2-digit', second:'2-digit' });
        let colorClass = type === 'success' ? 'log-success' : type === 'error' ? 'log-error' : type === 'webrtc' ? 'log-webrtc' : 'log-info';
        logWindow.innerHTML += `<div><span style="color:#555">[${time}]</span> <span class="${colorClass}">${msg}</span></div>`;
        logWindow.scrollTop = logWindow.scrollHeight;
    }

    function updateDebugStats(stat, value) { document.getElementById(`dbg-${stat}`).innerText = value; }

    function hideSetup() {
        document.getElementById('setup-screen').style.display = 'none';
        document.getElementById('chat-input').disabled = false;
        document.getElementById('send-btn').disabled = false;
        document.getElementById('status-dot').className = `status-dot ${isHost ? 'host' : 'online'}`;
        document.getElementById('ui-role').innerText = isHost ? 'Host' : 'Guest';
    }

    // --- KOMPRESE & DNS ---
    function komprimovat(data) { return btoa(String.fromCharCode.apply(null, pako.deflate(JSON.stringify(data)))); }
    function dekomprimovat(b64) {
        const str = atob(b64); const pole = new Uint8Array(str.length);
        for(let i=0; i<str.length; i++) pole[i] = str.charCodeAt(i);
        return JSON.parse(pako.inflate(pole, { to: 'string' }));
    }

    async function writeDns(subdomena, data) {
        updateDebugStats('dns', `ZÁPIS: ${subdomena}`);
        try {
            const res = await fetch(WORKER_URL, { method: "POST", headers: { "Content-Type": "application/json" }, body: JSON.stringify({ subdomain: subdomena, content: komprimovat(data) }) });
            if((await res.json()).success) { updateDebugStats('dns', 'ZAPÁNO OK'); return true; }
        } catch (e) { logDebug(`Chyba zápisu: ${e.message}`, 'error'); }
        return false;
    }

    async function readDns(subdomena) {
        updateDebugStats('dns', `ČTENÍ: ${subdomena}`);
        try {
            const res = await fetch(`https://cloudflare-dns.com/dns-query?name=${subdomena}.63e.cz&type=TXT`, { headers: { 'Accept': 'application/dns-json' } });
            const json = await res.json();
            if(!json.Answer) return null;
            updateDebugStats('dns', 'PŘEČTENO OK');
            return dekomprimovat(json.Answer[0].data.replace(/"/g, ''));
        } catch(e) { return null; }
    }

    // --- LOCAL STORAGE & HISTORIE ---
    function loadHistory() {
        const saved = localStorage.getItem('chat_history');
        if(saved) {
            chatHistory = JSON.parse(saved);
            chatHistory.forEach(msg => renderMessage(msg.author, msg.text, msg.author === myName ? 'self' : 'other', false));
            logDebug(`Načteno ${chatHistory.length} zpráv z LocalStorage.`, 'success');
            updateDebugStats('msg-count', chatHistory.length);
        }
    }

    function saveMessageToHistory(msgObj) {
        // Kontrola duplicit (při syncu)
        if(chatHistory.find(m => m.id === msgObj.id)) return false; 
        
        chatHistory.push(msgObj);
        if(chatHistory.length > MAX_HISTORY) chatHistory.shift();
        localStorage.setItem('chat_history', JSON.stringify(chatHistory));
        updateDebugStats('msg-count', chatHistory.length);
        return true;
    }

    function renderMessage(author, text, type, scroll = true) {
        const chat = document.getElementById('chat-area');
        const div = document.createElement('div');
        div.className = `msg msg-${type}`;
        div.innerHTML = type !== 'system' ? `<div style="font-size:0.75rem;color:#777;margin-bottom:3px;"><b>${author}</b></div>${text}` : text;
        chat.appendChild(div);
        if(scroll) chat.scrollTop = chat.scrollHeight;
    }

    function sendMsg() {
        const text = document.getElementById('chat-input').value.trim();
        if (!text) return;
        
        const msgObj = { id: Date.now() + Math.random().toString(16), type: 'msg', author: myName, text: text, time: Date.now() };
        saveMessageToHistory(msgObj);
        renderMessage('Ty', text, 'self');
        broadcast(msgObj); 
        document.getElementById('chat-input').value = '';
    }

    // --- WEBRTC CORE ---
    function createPeerConnection(guestId = null) {
        const pc = new RTCPeerConnection({ iceServers: [{ urls: 'stun:stun.l.google.com:19302' }] });
        pc.oniceconnectionstatechange = () => {
            logDebug(`[${guestId || 'Host'}] WebRTC ICE: ${pc.iceConnectionState}`, 'webrtc');
            if (pc.iceConnectionState === 'disconnected') {
                peers = peers.filter(p => p.guestId !== guestId);
                updateDebugStats('peers', peers.length);
            }
        };
        return pc;
    }

    function bindDataChannel(channel, guestId = null) {
        channel.onopen = () => {
            channel.guestId = guestId;
            peers.push(channel);
            updateDebugStats('peers', peers.length);
            document.getElementById('ui-user-count').innerText = peers.length + 1;
            
            logDebug(`P2P Kanál otevřen!`, 'success');
            
            // Pokud jsem Host, pošlu nováčkovi okamžitě historii chatu
            if(isHost) {
                logDebug(`Synchronizuji historii (${chatHistory.length} zpráv) s novým klientem...`, 'info');
                channel.send(JSON.stringify({ type: 'sync', history: chatHistory }));
            }
        };
        
        channel.onmessage = (e) => {
            const data = JSON.parse(e.data);
            
            if (data.type === 'sync' && !isHost) {
                logDebug(`Přijata synchronizace historie od Hosta.`, 'success');
                data.history.forEach(msg => {
                    if(saveMessageToHistory(msg)) {
                        renderMessage(msg.author, msg.text, msg.author === myName ? 'self' : 'other');
                    }
                });
            } else if (data.type === 'msg') {
                if(saveMessageToHistory(data)) {
                    renderMessage(data.author, data.text, 'other');
                    if (isHost) broadcast(data, channel); // Mesh Relay
                }
            }
        };
    }

    function broadcast(data, excludeChannel = null) {
        peers.forEach(ch => {
            if (ch !== excludeChannel && ch.readyState === 'open') ch.send(JSON.stringify(data));
        });
    }

    // --- AUTOMATICKÁ LOGIKA MÍSTNOSTI ---
    async function autoJoin() {
        myName = document.getElementById('username').value.trim() || 'Anonym';
        logDebug(`Startuji autodetekci sítě. Zjišťuji, zda žije Host...`, 'info');
        loadHistory();
        
        const hostAlive = await readDns('host-alive');
        
        // Záznam platí, pokud existuje a je mladší než 2 minuty (120 000 ms)
        if (hostAlive && hostAlive.timestamp && (Date.now() - hostAlive.timestamp < 120000)) {
            logDebug(`✅ Nalezen aktivní Host. Připojuji se jako GUEST [ID: ${myId}].`, 'success');
            becomeGuest();
        } else {
            logDebug(`❌ Žádný aktivní Host nenalezen. Vytvářím síť jako HOST.`, 'webrtc');
            becomeHost();
        }
    }

    // --- HOST ---
    let polledGuests = new Set();

    async function becomeHost() {
        isHost = true;
        hideSetup();
        renderMessage('System', 'Jsi Zakladatel sítě. Čekám na připojení dalších klientů...', 'system');
        
        // Host Heartbeat - každých 60 vteřin ohlásí, že žije
        await writeDns('host-alive', { timestamp: Date.now() });
        setInterval(() => writeDns('host-alive', { timestamp: Date.now() }), 60000);

        // Host naslouchá frontě čekajících Guestů
        setInterval(async () => {
            const queue = await readDns('queue');
            if (queue && queue.guestId && queue.guestId !== 'IDLE' && !polledGuests.has(queue.guestId)) {
                logDebug(`Nový Guest ve frontě! [ID: ${queue.guestId}]`, 'webrtc');
                polledGuests.add(queue.guestId);
                acceptGuest(queue.guestId);
            }
        }, 5000); // Polling každých 5s
    }

    async function acceptGuest(guestId) {
        const pc = createPeerConnection(guestId);
        bindDataChannel(pc.createDataChannel('chat'), guestId);

        const offer = await readDns(`offer-${guestId}`);
        if (!offer) {
            logDebug(`Chyba: Offer pro ${guestId} nenalezen.`, 'error');
            return;
        }

        logDebug(`Zpracovávám Offer od ${guestId}, generuji Answer...`, 'webrtc');
        await pc.setRemoteDescription(offer);
        await pc.setLocalDescription(await pc.createAnswer());

        pc.onicegatheringstatechange = async () => {
            if (pc.iceGatheringState === 'complete') {
                await writeDns(`answer-${guestId}`, pc.localDescription);
                await writeDns('queue', { guestId: 'IDLE' }); // Uvolnění fronty pro další
                logDebug(`Answer pro ${guestId} odeslán. Čekám na spojení.`, 'success');
            }
        };
    }

    // --- GUEST ---
    async function becomeGuest() {
        const pc = createPeerConnection(myId);
        pc.ondatachannel = (e) => bindDataChannel(e.channel, 'Host');

        logDebug("Generuji SDP Offer...", "webrtc");
        await pc.setLocalDescription(await pc.createOffer());
        
        pc.onicegatheringstatechange = async () => {
            if (pc.iceGatheringState === 'complete') {
                logDebug(`Zapisuji Offer do DNS a stoupám si do fronty...`, 'info');
                await writeDns(`offer-${myId}`, pc.localDescription);
                await writeDns('queue', { guestId: myId });

                // Guest nyní čeká, až se mu objeví Answer
                logDebug("⏳ Vyčkávám, než si mě Host z fronty vyzvedne a pošle Answer...", "info");
                const interval = setInterval(async () => {
                    const answer = await readDns(`answer-${myId}`);
                    if (answer) {
                        clearInterval(interval);
                        logDebug(`✅ Answer přijat! Buduji linku na Hosta.`, 'success');
                        await pc.setRemoteDescription(answer);
                        hideSetup();
                    }
                }, 5000);
            }
        };
    }
</script>
</body>
</html>
