<!DOCTYPE html>
<html lang="cs">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NetDIAG v3</title>
    <style>
        :root { --primary: #0078FF; --bg: #1e1e1e; --text: #eee; --panel: #2a2a2a; }
        body { font-family: -apple-system, sans-serif; background: var(--bg); color: var(--text); padding: 20px; margin: 0; line-height: 1.5; }
        .container { max-width: 900px; margin: 0 auto; }
        h1 { border-bottom: 2px solid var(--primary); padding-bottom: 10px; margin-bottom: 5px; }
        .subtitle { color: #aaa; font-size: 0.9rem; margin-bottom: 25px; }
        button { background: var(--primary); color: white; border: none; padding: 12px 24px; font-size: 1rem; border-radius: 6px; cursor: pointer; font-weight: bold; margin-bottom: 20px; transition: background 0.2s; }
        button:hover { background: #005bb5; }
        button:disabled { background: #555; cursor: not-allowed; }
        
        .test-box { background: var(--panel); margin-bottom: 15px; border-radius: 8px; overflow: hidden; border: 1px solid #444; box-shadow: 0 4px 6px rgba(0,0,0,0.3); }
        .test-header { padding: 12px 15px; display: flex; justify-content: space-between; align-items: center; background: #333; font-weight: bold; border-bottom: 1px solid #444; }
        .test-content { padding: 15px; font-family: 'Consolas', monospace; font-size: 0.8rem; color: #ccc; white-space: pre-wrap; word-break: break-all; max-height: 250px; overflow-y: auto; background: #111; }
        
        .status { padding: 4px 10px; border-radius: 4px; font-size: 0.8rem; font-weight: bold; text-transform: uppercase; letter-spacing: 0.5px; }
        .status.idle { background: #555; }
        .status.running { background: #f39c12; color: #000; box-shadow: 0 0 8px rgba(243, 156, 18, 0.5); }
        .status.success { background: #2ed573; color: #000; box-shadow: 0 0 8px rgba(46, 213, 115, 0.5); }
        .status.fail { background: #ff4757; color: #fff; box-shadow: 0 0 8px rgba(255, 71, 87, 0.5); }
        
        .log-info { color: #888; }
        .log-highlight { color: #00d2d3; font-weight: bold; }
        .log-good { color: #2ed573; font-weight: bold; }
        .log-warn { color: #feca57; }
        .log-err { color: #ff4757; font-weight: bold; }
        .log-state { color: #a29bfe; font-style: italic; }
    </style>
</head>
<body>

<div class="container">
    <h1>Rozšířená diagnostika sítě (Proxy/NAT) v2</h1>
    <div class="subtitle">Prověřuje HTTP, UDP STUN (včetně alt. portů), TURN UDP, TURN TCP a zabezpečený TURN TLS.</div>
    
    <button id="btn-start" onclick="runTests()">Zahájit hloubkovou diagnostiku</button>

    <div id="tests">
        <!-- Zde se vygenerují výsledky -->
    </div>
</div>

<script>
    const WORKER_URL = "https://api.63e.cz";
    const TIMEOUT_MS = 8000; 

    const SERVERS = {
        // Standardní STUN (Port 3478, 19302)
        stunStandard: [
            { urls: 'stun:stun.cloudflare.com:3478' },
            { urls: 'stun:stun.l.google.com:19302' },
            { urls: 'stun:global.stun.twilio.com:3478' }
        ],
        // STUN na nestandardních portech (obejití restrikcí na port 3478)
        stunAltPorts: [
            { urls: 'stun:stun.l.google.com:443' },
            { urls: 'stun:stun1.l.google.com:19305' },
            { urls: 'stun:stun.twilio.com:443' }
        ],
        // Standardní UDP Relay
        turnUdp: [
            { urls: 'turn:openrelay.metered.ca:80', username: 'openrelayproject', credential: 'openrelayproject' },
            { urls: 'turn:openrelay.metered.ca:443', username: 'openrelayproject', credential: 'openrelayproject' }
        ],
        // TCP Relay (obejití UDP blokace)
        turnTcp: [
            { urls: 'turn:openrelay.metered.ca:80?transport=tcp', username: 'openrelayproject', credential: 'openrelayproject' },
            { urls: 'turn:openrelay.metered.ca:443?transport=tcp', username: 'openrelayproject', credential: 'openrelayproject' }
        ],
        // TLS Relay (obejití Deep Packet Inspection proxy)
        turnTls: [
            { urls: 'turns:openrelay.metered.ca:443?transport=tcp', username: 'openrelayproject', credential: 'openrelayproject' }
        ]
    };

    function createTestUI(id, title) {
        const testsDiv = document.getElementById('tests');
        const box = document.createElement('div');
        box.className = 'test-box';
        box.id = `box-${id}`;
        box.innerHTML = `
            <div class="test-header">
                <span>${title}</span>
                <span class="status idle" id="status-${id}">ČEKÁ</span>
            </div>
            <div class="test-content" id="log-${id}">Čekám na spuštění...</div>
        `;
        testsDiv.appendChild(box);
    }

    function logToTest(id, msg, cssClass = '') {
        const logEl = document.getElementById(`log-${id}`);
        const time = new Date().toISOString().split('T')[1].slice(0, -1);
        const formattedMsg = cssClass ? `<span class="${cssClass}">${msg}</span>` : msg;
        
        if (logEl.innerHTML === 'Čekám na spuštění...') logEl.innerHTML = '';
        logEl.innerHTML += `<span class="log-info">[${time}]</span> ${formattedMsg}\n`;
        logEl.scrollTop = logEl.scrollHeight;
    }

    function setStatus(id, status, text) {
        const statusEl = document.getElementById(`status-${id}`);
        statusEl.className = `status ${status}`;
        statusEl.innerText = text;
    }

    function resetUI() {
        document.getElementById('tests').innerHTML = '';
        createTestUI('api', '1. HTTP / REST API (Signalizace)');
        createTestUI('stun-std', '2. WebRTC STUN (Standardní UDP 3478)');
        createTestUI('stun-alt', '3. WebRTC STUN (Alternativní porty 443/19305)');
        createTestUI('turn-udp', '4. WebRTC TURN (UDP Relay)');
        createTestUI('turn-tcp', '5. WebRTC TURN (TCP Relay pro těžké proxy)');
        createTestUI('turn-tls', '6. WebRTC TURNS (Šifrované TLS spojení přes port 443)');
    }

    async function testAPI() {
        setStatus('api', 'running', 'TESTUJI...');
        logToTest('api', `Odesílám testovací GET na: ${WORKER_URL}`);
        try {
            const start = performance.now();
            const res = await fetch(`${WORKER_URL}?key=ping-test&_t=${Date.now()}`);
            const time = Math.round(performance.now() - start);
            
            if (res.ok) {
                logToTest('api', `HTTP ${res.status} OK (Odezva: ${time} ms)`, 'log-good');
                logToTest('api', `API vrstva je plně průchozí.`, 'log-highlight');
                setStatus('api', 'success', 'PROŠLO');
            } else {
                logToTest('api', `Server odpověděl nečekaným kódem: ${res.status}`, 'log-err');
                setStatus('api', 'fail', 'SELHALO');
            }
        } catch (e) {
            logToTest('api', `Spojení selhalo. Proxy zřejmě provádí inspekci HTTPS (TLS) nebo blokuje doménu.`, 'log-err');
            logToTest('api', `Výjimka: ${e.message}`, 'log-err');
            setStatus('api', 'fail', 'BLOKOVÁNO');
        }
    }

    function testWebRTC(id, servers, policy, expectedType) {
        return new Promise((resolve) => {
            setStatus(id, 'running', 'TESTUJI...');
            logToTest(id, `Konfiguruji RTCPeerConnection...`);
            logToTest(id, `Politika směrování: ${policy.toUpperCase()} | Očekáváno: ${expectedType.toUpperCase()}`, 'log-highlight');
            
            let found = false;
            let timeout;
            let pc;
            
            try {
                pc = new RTCPeerConnection({
                    iceServers: servers,
                    iceTransportPolicy: policy,
                    iceCandidatePoolSize: 1
                });

                pc.onicegatheringstatechange = () => {
                    logToTest(id, `ICE Gathering State: ${pc.iceGatheringState}`, 'log-state');
                    if (pc.iceGatheringState === 'complete') {
                        clearTimeout(timeout);
                        finalizeTest();
                    }
                };

                pc.createDataChannel('diagnostics');

                pc.onicecandidate = (e) => {
                    if (e.candidate) {
                        const c = e.candidate;
                        let tcpTypeInfo = c.tcpType ? ` [TCP typ: ${c.tcpType}]` : '';
                        let relatedInfo = c.relatedAddress ? ` (Rel: ${c.relatedAddress}:${c.relatedPort})` : '';
                        
                        const logStr = `Nalezen: ${c.type.toUpperCase()} | Proto: ${c.protocol.toUpperCase()}${tcpTypeInfo} | ${c.address}:${c.port}${relatedInfo}`;
                        
                        if (c.type === expectedType) {
                            found = true;
                            logToTest(id, `✅ ${logStr}`, 'log-good');
                        } else {
                            logToTest(id, `ℹ️ ${logStr}`, 'log-info');
                        }
                    }
                };

                pc.createOffer().then(offer => pc.setLocalDescription(offer)).catch(e => {
                    logToTest(id, `Chyba při tvorbě SDP: ${e.message}`, 'log-err');
                    clearTimeout(timeout);
                    finalizeTest();
                });

                const finalizeTest = () => {
                    if (pc.signalingState !== 'closed') pc.close();
                    if (found) {
                        logToTest(id, `Úspěch! Síť tuto vrstvu nezablokovala.`, 'log-highlight');
                        setStatus(id, 'success', 'PROŠLO');
                    } else {
                        logToTest(id, `Chyba STUN/TURN: Proxy nebo Firewall tuto komunikaci zahazuje.`, 'log-err');
                        setStatus(id, 'fail', 'BLOKOVÁNO');
                    }
                    resolve(found);
                };

                timeout = setTimeout(() => {
                    logToTest(id, `Vypršel časový limit (${TIMEOUT_MS/1000}s) pro tento test.`, 'log-warn');
                    finalizeTest();
                }, TIMEOUT_MS);

            } catch (e) {
                logToTest(id, `Selhání prohlížeče/API: ${e.message}`, 'log-err');
                setStatus(id, 'fail', 'CHYBA API');
                resolve(false);
            }
        });
    }

    async function runTests() {
        const btn = document.getElementById('btn-start');
        btn.disabled = true;
        btn.innerText = 'Probíhá diagnostika (může trvat i 40 vteřin)...';
        
        resetUI();

        await testAPI();
        await testWebRTC('stun-std', SERVERS.stunStandard, 'all', 'srflx');
        await testWebRTC('stun-alt', SERVERS.stunAltPorts, 'all', 'srflx');
        await testWebRTC('turn-udp', SERVERS.turnUdp, 'relay', 'relay');
        await testWebRTC('turn-tcp', SERVERS.turnTcp, 'relay', 'relay');
        await testWebRTC('turn-tls', SERVERS.turnTls, 'relay', 'relay');

        btn.disabled = false;
        btn.innerText = 'Spustit diagnostiku znovu';
    }

    resetUI();
</script>

</body>
</html>
