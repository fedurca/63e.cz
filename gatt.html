<!DOCTYPE html>
<html lang="cs">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BLE GATT Skenner v2</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            max-width: 800px;
            margin: 20px auto;
            padding: 0 20px;
            background-color: #f4f4f9;
            color: #333;
        }
        h1 { color: #0056b3; }
        .controls {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            margin-bottom: 20px;
        }
        input[type="text"] {
            padding: 10px;
            font-size: 14px;
            width: 100%;
            border: 1px solid #ccc;
            border-radius: 5px;
            margin-bottom: 10px;
        }
        button {
            padding: 10px 20px;
            font-size: 16px;
            cursor: pointer;
            border: none;
            border-radius: 5px;
            background-color: #0056b3;
            color: white;
            transition: background-color 0.3s;
        }
        button:hover { background-color: #004494; }
        button:disabled { background-color: #cccccc; cursor: not-allowed; }
        #copyBtn { background-color: #28a745; }
        #copyBtn:hover { background-color: #218838; }
        
        .debug-window {
            background-color: #1e1e1e;
            color: #00ff00;
            padding: 15px;
            border-radius: 5px;
            height: 400px;
            overflow-y: auto;
            font-family: 'Courier New', Courier, monospace;
            white-space: pre-wrap;
            box-shadow: inset 0 0 10px #000;
        }
        .info {
            background-color: #fff3cd;
            border-left: 5px solid #ffeeba;
            padding: 10px;
            margin-bottom: 20px;
            font-size: 14px;
        }
    </style>
</head>
<body>

    <h1>Bluetooth Low Energy (GATT) Skenner v2</h1>
    
    <div class="info">
        Prohlížeč ukáže jen ty služby, o které explicitně požádáte. Standardní služby (baterie, info) se zkouší automaticky. Pokud znáte specifické 128-bit UUID svého zařízení, zadejte ho níže.
    </div>

    <input type="text" id="customUuid" placeholder="Volitelné: Vlastní UUID služby (např. 0000ffe0-0000-1000-8000-00805f9b34fb), lze oddělit čárkou">

    <div class="controls">
        <button id="scanBtn">🔍 Skenovat a připojit</button>
        <button id="copyBtn">📋 Zkopírovat výpis</button>
        <button id="clearBtn" style="background-color: #dc3545;">🗑️ Vymazat okno</button>
    </div>

    <div id="debugOutput" class="debug-window">Čekám na spuštění skenování...
</div>

    <script>
        const scanBtn = document.getElementById('scanBtn');
        const copyBtn = document.getElementById('copyBtn');
        const clearBtn = document.getElementById('clearBtn');
        const debugOutput = document.getElementById('debugOutput');
        const customUuidInput = document.getElementById('customUuid');

        let currentDevice = null; // Globální reference na připojené zařízení

        function log(message) {
            const time = new Date().toLocaleTimeString();
            debugOutput.textContent += `[${time}] ${message}\n`;
            debugOutput.scrollTop = debugOutput.scrollHeight;
        }

        clearBtn.addEventListener('click', () => {
            debugOutput.textContent = '';
            log("Okno vymazáno.");
        });

        copyBtn.addEventListener('click', async () => {
            try {
                await navigator.clipboard.writeText(debugOutput.textContent);
                alert("Výpis zkopírován do schránky!");
            } catch (err) {
                alert("Nepodařilo se zkopírovat text.");
            }
        });

        function getSupportedProperties(characteristic) {
            let supportedProperties = [];
            for (const p in characteristic.properties) {
                if (characteristic.properties[p] === true) {
                    supportedProperties.push(p.toUpperCase());
                }
            }
            return '[' + supportedProperties.join(', ') + ']';
        }

        // Handler pro případ, že se zařízení samo odpojí (typické pro Smart zámky, když nedostanou Auth kód)
        function onDisconnected(event) {
            const device = event.target;
            log(`\n⚠️ UPOZORNĚNÍ: Zařízení "${device.name}" neočekávaně ukončilo spojení (Disconnected).`);
        }

        scanBtn.addEventListener('click', async () => {
            log("-----------------------------------------");
            log("Spouštím vyhledávání zařízení...");
            
            try {
                // Základní standardní služby
                let optionalServices = [
                    'battery_service', 
                    'device_information', 
                    'heart_rate', 
                    'environmental_sensing',
                    'health_thermometer',
                    'tx_power'
                ];

                // Přidání vlastních UUID od uživatele
                const customUuids = customUuidInput.value.trim();
                if (customUuids) {
                    const uuids = customUuids.split(',').map(u => u.trim().toLowerCase());
                    optionalServices = optionalServices.concat(uuids);
                    log(`Přidáno vlastních UUID k žádosti: ${uuids.join(', ')}`);
                }

                const device = await navigator.bluetooth.requestDevice({
                    acceptAllDevices: true,
                    optionalServices: optionalServices
                });

                currentDevice = device;
                log(`Nalezeno zařízení: ${device.name || 'Neznámý název'}`);
                log(`ID zařízení: ${device.id}`);
                
                // Přidáme posluchač pro nečekané odpojení
                device.addEventListener('gattserverdisconnected', onDisconnected);

                log("Připojuji se ke GATT serveru...");
                const server = await device.gatt.connect();
                log("GATT Server úspěšně připojen!");

                log("Načítám primární služby...");
                const services = await server.getPrimaryServices();

                if (services.length === 0) {
                    log("Nenalezeny žádné služby (Zařízení používá nezmámá/custom UUID, o která jsme nepožádali).");
                } else {
                    for (const service of services) {
                        log(`\nSlužba (UUID): ${service.uuid}`);
                        
                        try {
                            const characteristics = await service.getCharacteristics();
                            for (const char of characteristics) {
                                log(`  ↳ Charakteristika: ${char.uuid}`);
                                log(`    Vlastnosti: ${getSupportedProperties(char)}`);
                                
                                if (char.properties.read) {
                                    try {
                                        const value = await char.readValue();
                                        let hex = [];
                                        for (let i = 0; i < value.byteLength; i++) {
                                            hex.push('0x' + ('00' + value.getUint8(i).toString(16)).slice(-2));
                                        }
                                        log(`    Aktuální hodnota: [${hex.join(', ')}]`);
                                    } catch (readError) {
                                        log(`    Nelze přečíst hodnotu: ${readError.message}`);
                                    }
                                }
                            }
                        } catch (charError) {
                            log(`  ↳ Nelze načíst charakteristiky: ${charError.message}`);
                        }
                    }
                }

                if (device.gatt.connected) {
                    device.gatt.disconnect();
                    log("\nZpracování dokončeno, zařízení odpojeno naším skriptem.");
                }

            } catch (error) {
                log(`\nCHYBA: ${error.message}`);
                
                // Správná filtrace chyb
                if (error.name === 'NotFoundError') {
                    log("-> Uživatel zrušil nativní okno, nebo nebylo vybráno žádné zařízení.");
                } else if (error.name === 'SecurityError') {
                    log("-> Bezpečnostní blokace: Prohlížeč odmítl komunikaci s tímto zařízením.");
                } else if (error.name === 'NetworkError') {
                    log("-> Problém se spojením: Zařízení je možná mimo dosah nebo odmítlo spojení.");
                }
            } finally {
                // Odstranění listeneru pro čistotu
                if (currentDevice) {
                    currentDevice.removeEventListener('gattserverdisconnected', onDisconnected);
                }
            }
        });
    </script>
</body>
</html>
